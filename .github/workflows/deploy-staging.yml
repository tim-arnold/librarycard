name: Deploy to Staging

on:
  push:
    branches: [ staging ]
  workflow_dispatch:
    inputs:
      migration_file:
        description: 'Migration file to apply (e.g., 20250722_add_user_global_permissions.sql)'
        required: false
        type: string

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    name: Deploy Worker to Staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          environment: staging
          command: deploy --env=staging

  deploy-database:
    runs-on: ubuntu-latest
    name: Deploy Database Migrations to Staging
    needs: deploy-worker
    if: github.event_name == 'workflow_dispatch' # Only run migrations manually
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 execute librarycard-db-staging --file=migrations/${{ github.event.inputs.migration_file }} --env=staging --remote
        if: github.event.inputs.migration_file != ''