name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      migration_file:
        description: 'Migration file to apply (e.g., 20250712_add_permission_tables.sql)'
        required: false
        type: string

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    name: Deploy Worker to Production
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          environment: production
          command: deploy --env=production

  deploy-database:
    runs-on: ubuntu-latest
    name: Deploy Database Migrations to Production
    environment: production
    needs: deploy-worker
    if: github.event_name == 'workflow_dispatch' # Only run migrations manually for safety
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 execute librarycard-db --file=migrations/${{ github.event.inputs.migration_file }} --env=production --remote
        if: github.event.inputs.migration_file != ''