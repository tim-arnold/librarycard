name: Staging Cloudflare Workers & D1 Backup

on:
  workflow_dispatch: # Manual trigger for testing
    inputs:
      reason:
        description: 'Reason for staging backup'
        required: false
        default: 'manual-test'
        type: string

permissions:
  contents: write
  
jobs:
  backup-staging:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Wrangler CLI
        run: npm install -g wrangler
      
      - name: Set Cloudflare API Token
        run: echo "CLOUDFLARE_API_TOKEN_STAGING_NEW is configured"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING_NEW }}
      
      - name: Create backup directory
        run: |
          mkdir -p backup/staging-cloudflare
          cd backup/staging-cloudflare
      
      - name: Backup Worker source code
        run: |
          echo "📦 Backing up Staging Worker source code..."
          
          # Create worker source backup
          tar -czf backup/staging-cloudflare/worker-source.tar.gz workers/
          
          # Copy configuration files
          cp wrangler.staging-new.toml backup/staging-cloudflare/
          cp schema.sql backup/staging-cloudflare/
          
          # Copy migration files
          if [ -d "migrations" ]; then
            tar -czf backup/staging-cloudflare/migrations.tar.gz migrations/
          fi
      
      - name: Backup D1 database schema
        run: |
          echo "🗄️ Backing up Staging D1 database schema..."
          cd backup/staging-cloudflare
          
          # Export current schema
          wrangler d1 execute librarycard-db-staging-new --config=../wrangler.staging-new.toml --env=staging --remote --command=".schema" > database-schema-backup.sql || echo "Schema backup failed"
          
          # Get table info for verification
          wrangler d1 execute librarycard-db-staging-new --config=../wrangler.staging-new.toml --env=staging --remote --command="SELECT name FROM sqlite_master WHERE type='table';" > tables-list.txt || echo "Tables list failed"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING_NEW }}
      
      - name: Backup D1 database data
        run: |
          echo "💾 Backing up Staging D1 database data..."
          cd backup/staging-cloudflare
          
          # Create comprehensive data backup using our staging backup script approach
          cat > backup-staging-data.js << 'EOF'
          #!/usr/bin/env node
          const { execSync } = require('child_process');
          const { writeFileSync } = require('fs');
          
          function executeD1Command(sql) {
            const command = `wrangler d1 execute librarycard-db-staging-new --config=../wrangler.staging-new.toml --env=staging --remote --command="${sql.replace(/"/g, '\\"')}"`;
            return execSync(command, { encoding: 'utf8' });
          }
          
          function parseD1Output(output) {
            try {
              const lines = output.split('\n');
              const jsonStartIndex = lines.findIndex(line => line.trim().startsWith('['));
              
              if (jsonStartIndex === -1) {
                console.warn('⚠️  No JSON found in D1 output');
                return [];
              }
              
              const jsonLines = lines.slice(jsonStartIndex);
              const jsonText = jsonLines.join('\n');
              const jsonData = JSON.parse(jsonText);
              
              if (Array.isArray(jsonData) && jsonData[0] && jsonData[0].results) {
                return jsonData[0].results;
              }
              
              return [];
            } catch (error) {
              console.warn('⚠️  Could not parse D1 JSON output:', error.message);
              return [];
            }
          }
          
          async function createGitHubActionsBackup() {
            console.log('📦 Creating comprehensive staging backup for GitHub Actions...');
            
            const backupData = {
              id: `staging-github-backup-${new Date().toISOString().replace(/[:.]/g, '-')}`,
              timestamp: new Date().toISOString(),
              reason: process.env.BACKUP_REASON || 'github-actions-test',
              environment: 'staging-new',
              tables: {},
              metadata: {
                created_by: 'github-actions',
                backup_method: 'automated-github',
                environment: 'staging-new'
              }
            };
          
            try {
              // Get list of all tables
              console.log('📋 Discovering database tables...');
              const tablesResult = executeD1Command(`
                SELECT name FROM sqlite_master 
                WHERE type='table' 
                AND name NOT LIKE 'sqlite_%'
                AND name NOT LIKE '_cf_%'
                ORDER BY name;
              `);
              
              const tables = parseD1Output(tablesResult);
              console.log(`Found ${tables.length} tables: ${tables.map(t => t.name).join(', ')}`);
          
              // Backup each table
              for (const table of tables) {
                console.log(`💾 Backing up table: ${table.name}`);
                
                try {
                  // Get table schema
                  const schemaResult = executeD1Command(`
                    SELECT sql FROM sqlite_master 
                    WHERE type='table' AND name='${table.name}';
                  `);
                  
                  // Get table data
                  const dataResult = executeD1Command(`SELECT * FROM ${table.name};`);
                  const tableData = parseD1Output(dataResult);
                  
                  backupData.tables[table.name] = {
                    schema: parseD1Output(schemaResult)[0]?.sql || '',
                    data: tableData,
                    row_count: tableData.length
                  };
                  
                  console.log(`  ✅ ${tableData.length} rows backed up from ${table.name}`);
                  
                } catch (error) {
                  console.log(`  ⚠️  Skipped table ${table.name}: ${error.message}`);
                }
              }
          
              // Calculate backup statistics
              const totalRows = Object.values(backupData.tables).reduce((sum, table) => sum + table.row_count, 0);
              backupData.metadata.total_tables = tables.length;
              backupData.metadata.total_rows = totalRows;
              backupData.metadata.size_estimate = JSON.stringify(backupData).length;
          
              // Write backup file
              writeFileSync('staging-database-backup.json', JSON.stringify(backupData, null, 2));
              
              console.log(`✅ Staging backup completed successfully!`);
              console.log(`📊 Stats: ${tables.length} tables, ${totalRows} rows`);
              console.log(`💾 Size: ${(backupData.metadata.size_estimate / 1024 / 1024).toFixed(2)} MB`);
              
              return backupData;
          
            } catch (error) {
              console.error('❌ Staging backup failed:', error.message);
              throw error;
            }
          }
          
          createGitHubActionsBackup().then(() => {
            console.log('🎉 GitHub Actions staging backup completed');
          }).catch(error => {
            console.error('💥 GitHub Actions staging backup failed:', error.message);
            process.exit(1);
          });
          EOF
          
          chmod +x backup-staging-data.js
          
          # Run the comprehensive backup
          BACKUP_REASON="${{ github.event.inputs.reason }}" node backup-staging-data.js
          
          # Get row counts for verification
          echo "📊 Getting database statistics..."
          cat > database-stats.txt << EOF
          Staging Database Statistics - $(date -u)
          ========================================
          
          EOF
          
          # Try to get row counts (may fail if DB is busy)
          wrangler d1 execute librarycard-db-staging-new --config=../wrangler.staging-new.toml --env=staging --remote --command="SELECT 'users' as table_name, COUNT(*) as row_count FROM users UNION ALL SELECT 'locations', COUNT(*) FROM locations UNION ALL SELECT 'shelves', COUNT(*) FROM shelves UNION ALL SELECT 'books', COUNT(*) FROM books UNION ALL SELECT 'location_members', COUNT(*) FROM location_members;" >> database-stats.txt || echo "Row count query failed" >> database-stats.txt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING_NEW }}
      
      - name: Get Worker deployment info
        run: |
          echo "⚙️ Getting Staging Worker deployment information..."
          cd backup/staging-cloudflare
          
          # Try to get worker info
          wrangler whoami > worker-auth-info.txt || echo "Auth info failed"
          
          # List workers
          wrangler list > workers-list.txt || echo "Workers list failed"
          
          # Get current deployment info if possible
          echo "Checking staging worker deployment status..." > deployment-status.txt
          wrangler status || echo "Status check failed" >> deployment-status.txt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING_NEW }}
      
      - name: Create backup metadata
        run: |
          cd backup/staging-cloudflare
          
          cat > backup-metadata.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "backup_type": "staging-automated",
            "environment": "staging-new",
            "commit_sha": "${{ github.sha }}",
            "commit_message": "$(git log -1 --pretty=%B | tr '\n' ' ')",
            "branch": "${{ github.ref_name }}",
            "reason": "${{ github.event.inputs.reason }}",
            "worker_source_files": [
              "worker-source.tar.gz",
              "wrangler.staging-new.toml",
              "schema.sql"
            ],
            "database_files": [
              "database-schema-backup.sql",
              "tables-list.txt",
              "database-stats.txt",
              "staging-database-backup.json"
            ],
            "scripts": [
              "backup-staging-data.js"
            ]
          }
          EOF
          
          # Create restoration guide for staging
          cat > RESTORE-STAGING.md << 'EOF'
          # Staging Cloudflare Workers & D1 Restoration Guide
          
          ## Worker Restoration
          
          ### 1. Extract Worker Source
          \`\`\`bash
          tar -xzf worker-source.tar.gz
          \`\`\`
          
          ### 2. Deploy Worker
          \`\`\`bash
          # Install dependencies
          npm install
          
          # Authenticate with Cloudflare (staging account)
          wrangler auth login
          
          # Deploy worker to staging
          cd workers
          wrangler deploy --config=../wrangler.staging-new.toml --env=staging
          \`\`\`
          
          ## D1 Database Restoration
          
          ### 1. Use Comprehensive Backup Data
          The \`staging-database-backup.json\` file contains complete table schemas and data.
          
          ### 2. Restore Using GitHub Actions
          Use the "Staging Database Restore" workflow with this backup ID.
          
          ### 3. Manual Restoration (if needed)
          \`\`\`bash
          # Apply schema
          wrangler d1 execute librarycard-db-staging-new --config=wrangler.staging-new.toml --env=staging --file=schema.sql
          
          # Use the staging restore script with the backup JSON
          node scripts/restore-staging.js
          \`\`\`
          
          ## Environment Configuration
          
          ### Required Secrets
          - \`CLOUDFLARE_API_TOKEN_STAGING_NEW\` with Workers and D1 permissions
          
          ### Verification Steps
          1. Worker deploys successfully to staging
          2. Database schema matches original
          3. API endpoints respond correctly
          4. Frontend can connect to restored worker
          5. Test data integrity with spot checks
          
          ## Testing Notes
          - This is STAGING - safe for testing restore procedures
          - Use this to validate restore processes before production
          - Test both automated and manual restore methods
          - Verify backup/restore cycle completeness
          EOF
      
      - name: Create archive
        run: |
          cd backup
          tar -czf staging-cloudflare-backup-$(date +%Y%m%d-%H%M).tar.gz staging-cloudflare/
      
      - name: Set release variables
        run: |
          echo "RELEASE_DATE=$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV
          echo "RELEASE_DATE_READABLE=$(date '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_ENV
          echo "BACKUP_DATE=$(date -u)" >> $GITHUB_ENV
      
      - name: Upload backup to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: staging-backup-${{ github.run_number }}-${{ env.RELEASE_DATE }}
          name: "Staging Backup - ${{ env.RELEASE_DATE_READABLE }}"
          body: |
            ## Automated Staging Cloudflare Workers & D1 Backup
            
            **Backup Date:** ${{ env.BACKUP_DATE }}
            **Environment:** Staging (staging-new)
            **Commit:** ${{ github.sha }}
            **Reason:** ${{ github.event.inputs.reason }}
            **Type:** Workers + D1 Database (Complete)
            
            ### Contents:
            - 🔧 Complete Worker source code
            - 🗄️ Database schema backup
            - 📊 Database statistics and table info
            - 💾 **Complete database backup with all data**
            - 📋 Configuration files (wrangler.staging-new.toml, schema.sql)
            - 🔄 Migration files
            - 📖 Staging restoration guide
            
            ### Restore Instructions:
            1. Download and extract the backup archive
            2. Follow RESTORE-STAGING.md for detailed steps
            3. Use GitHub Actions "Staging Database Restore" workflow
            4. Or use `staging-database-backup.json` with local restore scripts
            
            **This backup includes complete data restoration capabilities for testing!**
            
            ### Test with this backup:
            - Validate GitHub Actions restore workflow
            - Test manual restore procedures
            - Verify backup/restore cycle before production use
          files: |
            backup/staging-cloudflare-backup-*.tar.gz
          draft: false
          prerelease: true
      
      - name: Notify on success
        run: |
          echo "✅ Staging backup completed successfully!"
          echo "🎯 Ready to test restore workflows with this backup"
          echo "📦 Backup stored in GitHub Releases with tag: staging-backup-${{ github.run_number }}-${{ env.RELEASE_DATE }}"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Staging backup failed!"
          echo "Check workflow logs and verify:"
          echo "1. CLOUDFLARE_API_TOKEN_STAGING_NEW secret is set"
          echo "2. Token has Workers and D1 permissions"
          echo "3. Database name matches wrangler.staging-new.toml"
          echo "4. Staging environment is accessible"