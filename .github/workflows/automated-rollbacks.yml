name: ⏪ Automated Database Rollbacks

concurrency:
  group: db-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
        default: 'staging'
      batch_id:
        description: 'Batch ID to rollback (leave empty for last batch)'
        required: false
        type: string
      confirmation:
        description: 'Type "CONFIRM" to proceed with rollback (DATA LOSS POSSIBLE)'
        required: true
        type: string
      reason:
        description: 'Reason for rollback (required for audit)'
        required: true
        type: string

jobs:
  validate-rollback:
    name: Validate Rollback Request
    runs-on: ubuntu-latest
    outputs:
      can_proceed: ${{ steps.validate.outputs.can_proceed }}
      target_batch: ${{ steps.validate.outputs.target_batch }}
    
    steps:
      - name: Validate confirmation
        id: validate
        run: |
          if [[ "${{ github.event.inputs.confirmation }}" != "CONFIRM" ]]; then
            echo "❌ Rollback cancelled: confirmation not provided"
            echo "You must type 'CONFIRM' to proceed with rollback"
            exit 1
          fi
          
          if [[ -z "${{ github.event.inputs.reason }}" ]]; then
            echo "❌ Rollback cancelled: reason is required for audit trail"
            exit 1
          fi
          
          echo "✅ Rollback validation passed"
          echo "can_proceed=true" >> $GITHUB_OUTPUT
          echo "target_batch=${{ github.event.inputs.batch_id }}" >> $GITHUB_OUTPUT

      - name: Log rollback request
        run: |
          echo "🚨 ROLLBACK REQUEST VALIDATED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Batch ID: ${{ github.event.inputs.batch_id || 'Last successful batch' }}"
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo "Requested by: ${{ github.actor }}"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  rollback-staging:
    name: Rollback Staging Database
    runs-on: ubuntu-latest
    needs: validate-rollback
    if: github.event.inputs.environment == 'staging' && needs.validate-rollback.outputs.can_proceed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check rollback availability
        run: |
          echo "🔍 Checking rollback availability for staging..."
          export MIGRATION_ENV="staging-new"
          
          # Check what batch would be rolled back
          if [[ -n "${{ github.event.inputs.batch_id }}" ]]; then
            echo "Target batch: ${{ github.event.inputs.batch_id }}"
          else
            echo "Target: Last successful batch"
          fi
          
          # Show current migration status
          npm run migrate:status
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING_NEW }}

      - name: Execute rollback on staging
        run: |
          echo "🔄 Executing rollback on staging environment..."
          export MIGRATION_ENV="staging-new"
          
          if [[ -n "${{ github.event.inputs.batch_id }}" ]]; then
            echo "Rolling back specific batch: ${{ github.event.inputs.batch_id }}"
            node scripts/migrate.js rollback "${{ github.event.inputs.batch_id }}"
          else
            echo "Rolling back last successful batch"
            npm run migrate:rollback:staging
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING_NEW }}

      - name: Verify staging health after rollback
        run: |
          echo "🔍 Verifying staging API health after rollback..."
          sleep 10
          STAGING_API_URL="https://librarycard-api-staging.librarycard-staging.workers.dev"
          if curl -f -s --max-time 30 "$STAGING_API_URL/health" > /dev/null; then
            echo "✅ Staging API is healthy after rollback"
          else
            echo "❌ Staging API unresponsive after rollback"
            echo "🚨 URGENT: Manual intervention required"
            exit 1
          fi

      - name: Check final migration status
        run: |
          echo "📊 Final migration status after rollback:"
          export MIGRATION_ENV="staging-new"
          npm run migrate:status
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING_NEW }}

  rollback-production:
    name: Rollback Production Database
    runs-on: ubuntu-latest
    needs: validate-rollback
    if: github.event.inputs.environment == 'production' && needs.validate-rollback.outputs.can_proceed == 'true'
    environment: production  # Requires manual approval
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create pre-rollback backup
        run: |
          echo "💾 Creating production backup before rollback..."
          npm run backup:create
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PRODUCTION }}

      - name: Check rollback availability
        run: |
          echo "🔍 Checking rollback availability for production..."
          export MIGRATION_ENV="production"
          
          # Check what batch would be rolled back
          if [[ -n "${{ github.event.inputs.batch_id }}" ]]; then
            echo "Target batch: ${{ github.event.inputs.batch_id }}"
          else
            echo "Target: Last successful batch"
          fi
          
          # Show current migration status
          npm run migrate:status
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PRODUCTION }}

      - name: Execute rollback on production
        run: |
          echo "🔄 Executing rollback on production environment..."
          export MIGRATION_ENV="production"
          
          if [[ -n "${{ github.event.inputs.batch_id }}" ]]; then
            echo "Rolling back specific batch: ${{ github.event.inputs.batch_id }}"
            node scripts/migrate.js rollback "${{ github.event.inputs.batch_id }}"
          else
            echo "Rolling back last successful batch"
            npm run migrate:rollback:production
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PRODUCTION }}

      - name: Verify production health after rollback
        run: |
          echo "🔍 Verifying production API health after rollback..."
          sleep 15
          PRODUCTION_API_URL="https://librarycard-api.librarycard.workers.dev"
          if curl -f -s --max-time 30 "$PRODUCTION_API_URL/health" > /dev/null; then
            echo "✅ Production API is healthy after rollback"
          else
            echo "❌ Production API unresponsive after rollback"
            echo "🚨 CRITICAL: Manual intervention required immediately"
            exit 1
          fi

      - name: Check final migration status
        run: |
          echo "📊 Final migration status after rollback:"
          export MIGRATION_ENV="production"
          npm run migrate:status
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PRODUCTION }}

      - name: Notify rollback completion
        run: |
          echo "🎯 PRODUCTION ROLLBACK COMPLETED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Environment: Production"
          echo "Batch rolled back: ${{ github.event.inputs.batch_id || 'Last successful batch' }}"
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo "Executed by: ${{ github.actor }}"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Commit: ${{ github.sha }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"