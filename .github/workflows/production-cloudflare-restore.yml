name: Ώθγρ PRODUCTION Cloudflare Database Restore

on:
  workflow_dispatch:
    inputs:
      backup_tag:
        description: 'GitHub Release tag of the PRODUCTION backup to restore (e.g., cf-backup-123-20250816)'
        required: true
        type: string
      confirmation_1:
        description: 'Type "RESTORE PRODUCTION DATABASE" to confirm this will overwrite PRODUCTION data'
        required: true
        type: string
      confirmation_2:
        description: 'Type "I UNDERSTAND THIS IS IRREVERSIBLE" for final confirmation'
        required: true
        type: string
      emergency_reason:
        description: 'Emergency reason for production restore (required for audit)'
        required: true
        type: string

permissions:
  contents: read
  
jobs:
  restore-production:
    runs-on: ubuntu-latest
    
    # EXTREME SAFETY CHECKS
    if: >
      github.event.inputs.confirmation_1 == 'RESTORE PRODUCTION DATABASE' &&
      github.event.inputs.confirmation_2 == 'I UNDERSTAND THIS IS IRREVERSIBLE' &&
      github.event.inputs.emergency_reason != ''
    
    environment: production # Require environment approval
    
    steps:
      - name: Ώθγρ PRODUCTION RESTORE WARNING
        run: |
          echo "ΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρ"
          echo "Ώθγρ                                                Ώθγρ"
          echo "Ώθγρ        PRODUCTION DATABASE RESTORE            Ώθγρ"
          echo "Ώθγρ                                                Ώθγρ"
          echo "Ώθγρ  THIS WILL OVERWRITE ALL PRODUCTION DATA!     Ώθγρ"
          echo "Ώθγρ                                                Ώθγρ"
          echo "ΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρΏθγρ"
          echo ""
          echo "Backup to restore: ${{ github.event.inputs.backup_tag }}"
          echo "Emergency reason: ${{ github.event.inputs.emergency_reason }}"
          echo "Started by: ${{ github.actor }}"
          echo "Start time: $(date -u)"
          echo ""
          echo "έΠ░ Waiting 30 seconds for final consideration..."
          sleep 30
      
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Wrangler CLI
        run: npm install -g wrangler
      
      - name: Set Cloudflare API Token
        run: echo "CLOUDFLARE_API_TOKEN is configured"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Validate backup tag
        run: |
          echo "ΏθΦΞ Validating PRODUCTION backup tag: ${{ github.event.inputs.backup_tag }}"
          
          # Check if tag exists
          if ! gh release view "${{ github.event.inputs.backup_tag }}" > /dev/null 2>&1; then
            echo "έζΝ Release tag not found: ${{ github.event.inputs.backup_tag }}"
            exit 1
          fi
          
          # Verify it's a production backup (should start with 'cf-backup-')
          if [[ "${{ github.event.inputs.backup_tag }}" != cf-backup-* ]]; then
            echo "έζΝ Invalid production backup tag format. Must start with 'cf-backup-'"
            exit 1
          fi
          
          echo "έεΖ Production backup tag validated"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Emergency pre-restore backup notice
        run: |
          echo "ΏθΤ╛ EMERGENCY PRE-RESTORE BACKUP NOTICE"
          echo "======================================"
          echo "Ώθγρ CRITICAL: You MUST manually run 'Cloudflare Workers & D1 Backup'"
          echo "   workflow BEFORE proceeding with this production restore!"
          echo ""
          echo "ΏθΥΜ Steps to create emergency backup:"
          echo "1. Go to Actions έΗΤ 'Cloudflare Workers & D1 Backup'"
          echo "2. Click 'Run workflow' έΗΤ Enter reason: 'emergency-pre-restore'"
          echo "3. Wait for backup completion"
          echo "4. Then re-run this restore workflow"
          echo ""
          echo "έγιΎ╕Π  PRODUCTION RESTORE WITHOUT BACKUP IS EXTREMELY DANGEROUS"
          echo ""
          echo "έΠ░ Waiting 30 seconds for review..."
          sleep 30
      
      - name: Download backup from GitHub Release
        run: |
          echo "ΏθΥξ Downloading PRODUCTION backup from GitHub Release..."
          
          # Create restore directory
          mkdir -p restore-workspace
          cd restore-workspace
          
          # Download the backup archive
          gh release download "${{ github.event.inputs.backup_tag }}" -p "*.tar.gz"
          
          # Extract the archive
          tar -xzf *.tar.gz
          
          # Verify backup contents
          echo "ΏθΥΜ Production backup contents:"
          ls -la cloudflare/
          
          # Note: Production backups may not have the comprehensive JSON backup yet
          echo "έγιΎ╕Π  Production backup structure may differ from staging backups"
          echo "ΏθΥΜ Available files:"
          find cloudflare/ -name "*.sql" -o -name "*.json" -o -name "*.txt" | head -20
          
          echo "έεΖ Production backup downloaded"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Analyze backup structure
        run: |
          echo "ΏθΦΞ Analyzing production backup structure..."
          cd restore-workspace/cloudflare
          
          # Check what type of backup this is
          if [ -f "database-schema-backup.sql" ]; then
            echo "έεΖ Found schema backup"
          else
            echo "έζΝ Schema backup not found"
          fi
          
          if [ -f "database-stats.txt" ]; then
            echo "ΏθΥΛ Database statistics:"
            cat database-stats.txt | head -20
          fi
          
          if [ -f "backup-d1-data.sh" ]; then
            echo "έεΖ Found data backup script"
          else
            echo "έγιΎ╕Π  Data backup script not found - may need manual data export"
          fi
          
          echo "ΏθΥΜ All available files:"
          ls -la
      
      - name: Execute schema restore
        run: |
          echo "ΏθΦΕ Restoring PRODUCTION database schema..."
          cd restore-workspace/cloudflare
          
          if [ -f "database-schema-backup.sql" ]; then
            echo "ΏθΥΜ Applying schema backup..."
            wrangler d1 execute librarycard-db --env=production --remote --file=database-schema-backup.sql
            echo "έεΖ Schema restored"
          else
            echo "έγιΎ╕Π  No schema backup found - attempting schema.sql"
            if [ -f "schema.sql" ]; then
              wrangler d1 execute librarycard-db --env=production --remote --file=schema.sql
              echo "έεΖ Base schema applied"
            else
              echo "έζΝ No schema files available"
              exit 1
            fi
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Data restore warning
        run: |
          echo "έγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕Π"
          echo "έγιΎ╕Π                                                έγιΎ╕Π"
          echo "έγιΎ╕Π         PRODUCTION DATA RESTORE                έγιΎ╕Π"
          echo "έγιΎ╕Π                                                έγιΎ╕Π"
          echo "έγιΎ╕Π  CURRENT PRODUCTION BACKUPS MAY HAVE LIMITED  έγιΎ╕Π"
          echo "έγιΎ╕Π  DATA RESTORATION CAPABILITIES                 έγιΎ╕Π"
          echo "έγιΎ╕Π                                                έγιΎ╕Π"
          echo "έγιΎ╕Π  MANUAL DATA RESTORATION MAY BE REQUIRED      έγιΎ╕Π"
          echo "έγιΎ╕Π                                                έγιΎ╕Π"
          echo "έγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕ΠέγιΎ╕Π"
          echo ""
          echo "ΏθΥΜ Current production backup capabilities:"
          echo "- έεΖ Schema restoration"
          echo "- έεΖ Worker source code"
          echo "- έγιΎ╕Π  Data restoration (may require manual steps)"
          echo ""
          echo "ΏθΥΨ See RESTORE-CLOUDFLARE.md for manual data restoration steps"
      
      - name: Provide manual restoration guidance
        run: |
          echo "ΏθΥΨ PRODUCTION DATA RESTORATION GUIDANCE"
          echo "======================================="
          echo ""
          echo "Current production backups use the legacy format."
          echo "For complete data restoration, you may need to:"
          echo ""
          echo "1. Use the backup-d1-data.sh script to export data from a recent backup"
          echo "2. Manually execute table-by-table restoration commands"
          echo "3. Verify data integrity after restoration"
          echo ""
          echo "ΏθΥΜ Available restoration files in this backup:"
          cd restore-workspace/cloudflare
          ls -la *.sh *.sql *.txt 2>/dev/null || echo "No restoration files found"
          echo ""
          echo "Ώθγρ RECOMMENDATION: Consider upgrading production backups to include"
          echo "   comprehensive data backup like the staging system before proceeding"
      
      - name: Verify basic connectivity
        run: |
          echo "ΏθΦΞ Verifying basic PRODUCTION database connectivity..."
          
          # Test basic database connectivity
          wrangler d1 execute librarycard-db --env=production --remote --command="SELECT name FROM sqlite_master WHERE type='table';" || echo "Table list check failed"
          
          echo "έεΖ Basic connectivity verified"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Cleanup
        if: always()
        run: |
          echo "Ώθπ╣ Cleaning up restore workspace..."
          rm -rf restore-workspace
          echo "έεΖ Cleanup completed"
      
      - name: Log emergency restore
        if: always()
        run: |
          echo "ΏθΥζ PRODUCTION RESTORE AUDIT LOG"
          echo "==============================="
          echo "Restore Date: $(date -u)"
          echo "Initiated by: ${{ github.actor }}"
          echo "Backup used: ${{ github.event.inputs.backup_tag }}"
          echo "Emergency reason: ${{ github.event.inputs.emergency_reason }}"
          echo "Status: ${{ job.status }}"
          echo ""
          echo "Ώθγρ This production restore event has been logged for audit purposes"
      
      - name: Notify on success
        run: |
          echo "έεΖ PRODUCTION restore completed!"
          echo "ΏθΟψ Backup restored from: ${{ github.event.inputs.backup_tag }}"
          echo "ΏθΥΜ CRITICAL NEXT STEPS:"
          echo "1. Verify production application is functioning"
          echo "2. Test critical user flows immediately"
          echo "3. Check data integrity thoroughly"
          echo "4. Monitor for any restoration issues"
          echo "5. Consider data restoration if schema-only restore was performed"
          echo ""
          echo "Ώθγρ PRODUCTION DATABASE RESTORE COMPLETED"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "έζΝ PRODUCTION restore FAILED!"
          echo "ΏθγρΏθγρΏθγρ PRODUCTION EMERGENCY ΏθγρΏθγρΏθγρ"
          echo ""
          echo "ΏθΥΜ IMMEDIATE ACTIONS REQUIRED:"
          echo "1. Check production application status"
          echo "2. Assess database state"
          echo "3. Consider emergency rollback using pre-restore backup"
          echo "4. Contact technical team immediately"
          echo "5. Review failure logs above"
          echo ""
          echo "ΏθΗα PRODUCTION DATABASE MAY BE IN INCONSISTENT STATE"
          echo "ΏθΗα IMMEDIATE TECHNICAL INTERVENTION REQUIRED"