name: рЯЪ® PRODUCTION Cloudflare Database Restore

on:
  workflow_dispatch:
    inputs:
      backup_tag:
        description: 'GitHub Release tag of the PRODUCTION backup to restore (e.g., cf-backup-123-20250816)'
        required: true
        type: string
      confirmation_1:
        description: 'Type "RESTORE PRODUCTION DATABASE" to confirm this will overwrite PRODUCTION data'
        required: true
        type: string
      confirmation_2:
        description: 'Type "I UNDERSTAND THIS IS IRREVERSIBLE" for final confirmation'
        required: true
        type: string
      emergency_reason:
        description: 'Emergency reason for production restore (required for audit)'
        required: true
        type: string

permissions:
  contents: read
  
jobs:
  restore-production:
    runs-on: ubuntu-latest
    
    # EXTREME SAFETY CHECKS
    if: >
      github.event.inputs.confirmation_1 == 'RESTORE PRODUCTION DATABASE' &&
      github.event.inputs.confirmation_2 == 'I UNDERSTAND THIS IS IRREVERSIBLE' &&
      github.event.inputs.emergency_reason != ''
    
    environment: production # Require environment approval
    
    steps:
      - name: рЯЪ® PRODUCTION RESTORE WARNING
        run: |
          echo "рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®"
          echo "рЯЪ®                                                рЯЪ®"
          echo "рЯЪ®        PRODUCTION DATABASE RESTORE            рЯЪ®"
          echo "рЯЪ®                                                рЯЪ®"
          echo "рЯЪ®  THIS WILL OVERWRITE ALL PRODUCTION DATA!     рЯЪ®"
          echo "рЯЪ®                                                рЯЪ®"
          echo "рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®рЯЪ®"
          echo ""
          echo "Backup to restore: ${{ github.event.inputs.backup_tag }}"
          echo "Emergency reason: ${{ github.event.inputs.emergency_reason }}"
          echo "Started by: ${{ github.actor }}"
          echo "Start time: $(date -u)"
          echo ""
          echo "вП∞ Waiting 30 seconds for final consideration..."
          sleep 30
      
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Wrangler CLI
        run: npm install -g wrangler
      
      - name: Set Cloudflare API Token
        run: echo "CLOUDFLARE_API_TOKEN is configured"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Validate backup tag
        run: |
          echo "рЯФН Validating PRODUCTION backup tag: ${{ github.event.inputs.backup_tag }}"
          
          # Check if tag exists
          if ! gh release view "${{ github.event.inputs.backup_tag }}" > /dev/null 2>&1; then
            echo "вЭМ Release tag not found: ${{ github.event.inputs.backup_tag }}"
            exit 1
          fi
          
          # Verify it's a production backup (should start with 'cf-backup-')
          if [[ "${{ github.event.inputs.backup_tag }}" != cf-backup-* ]]; then
            echo "вЭМ Invalid production backup tag format. Must start with 'cf-backup-'"
            exit 1
          fi
          
          echo "вЬЕ Production backup tag validated"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Emergency pre-restore backup notice
        run: |
          echo "рЯТЊ EMERGENCY PRE-RESTORE BACKUP NOTICE"
          echo "======================================"
          echo "рЯЪ® CRITICAL: You MUST manually run 'Cloudflare Workers & D1 Backup'"
          echo "   workflow BEFORE proceeding with this production restore!"
          echo ""
          echo "рЯУЛ Steps to create emergency backup:"
          echo "1. Go to Actions вЖТ 'Cloudflare Workers & D1 Backup'"
          echo "2. Click 'Run workflow' вЖТ Enter reason: 'emergency-pre-restore'"
          echo "3. Wait for backup completion"
          echo "4. Then re-run this restore workflow"
          echo ""
          echo "вЪ†пЄП  PRODUCTION RESTORE WITHOUT BACKUP IS EXTREMELY DANGEROUS"
          echo ""
          echo "вП∞ Waiting 30 seconds for review..."
          sleep 30
      
      - name: Download backup from GitHub Release
        run: |
          echo "рЯУ• Downloading PRODUCTION backup from GitHub Release..."
          
          # Create restore directory
          mkdir -p restore-workspace
          cd restore-workspace
          
          # Download the backup archive
          gh release download "${{ github.event.inputs.backup_tag }}" -p "*.tar.gz"
          
          # Extract the archive
          tar -xzf *.tar.gz
          
          # Verify backup contents
          echo "рЯУЛ Production backup contents:"
          ls -la cloudflare/
          
          # Note: Production backups may not have the comprehensive JSON backup yet
          echo "вЪ†пЄП  Production backup structure may differ from staging backups"
          echo "рЯУЛ Available files:"
          find cloudflare/ -name "*.sql" -o -name "*.json" -o -name "*.txt" | head -20
          
          echo "вЬЕ Production backup downloaded"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Analyze backup structure
        run: |
          echo "рЯФН Analyzing production backup structure..."
          cd restore-workspace/cloudflare
          
          # Check what type of backup this is
          if [ -f "database-schema-backup.sql" ]; then
            echo "вЬЕ Found schema backup"
          else
            echo "вЭМ Schema backup not found"
          fi
          
          if [ -f "database-stats.txt" ]; then
            echo "рЯУК Database statistics:"
            cat database-stats.txt | head -20
          fi
          
          if [ -f "backup-d1-data.sh" ]; then
            echo "вЬЕ Found data backup script"
          else
            echo "вЪ†пЄП  Data backup script not found - may need manual data export"
          fi
          
          echo "рЯУЛ All available files:"
          ls -la
      
      - name: Execute schema restore
        run: |
          echo "рЯФД Restoring PRODUCTION database schema..."
          cd restore-workspace/cloudflare
          
          if [ -f "database-schema-backup.sql" ]; then
            echo "рЯУЛ Applying schema backup..."
            wrangler d1 execute librarycard-db --config=wrangler.prod.toml --env=production --remote --file=database-schema-backup.sql
            echo "вЬЕ Schema restored"
          else
            echo "вЪ†пЄП  No schema backup found - attempting schema.sql"
            if [ -f "schema.sql" ]; then
              wrangler d1 execute librarycard-db --config=wrangler.prod.toml --env=production --remote --file=schema.sql
              echo "вЬЕ Base schema applied"
            else
              echo "вЭМ No schema files available"
              exit 1
            fi
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Data restore warning
        run: |
          echo "вЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄП"
          echo "вЪ†пЄП                                                вЪ†пЄП"
          echo "вЪ†пЄП         PRODUCTION DATA RESTORE                вЪ†пЄП"
          echo "вЪ†пЄП                                                вЪ†пЄП"
          echo "вЪ†пЄП  CURRENT PRODUCTION BACKUPS MAY HAVE LIMITED  вЪ†пЄП"
          echo "вЪ†пЄП  DATA RESTORATION CAPABILITIES                 вЪ†пЄП"
          echo "вЪ†пЄП                                                вЪ†пЄП"
          echo "вЪ†пЄП  MANUAL DATA RESTORATION MAY BE REQUIRED      вЪ†пЄП"
          echo "вЪ†пЄП                                                вЪ†пЄП"
          echo "вЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄПвЪ†пЄП"
          echo ""
          echo "рЯУЛ Current production backup capabilities:"
          echo "- вЬЕ Schema restoration"
          echo "- вЬЕ Worker source code"
          echo "- вЪ†пЄП  Data restoration (may require manual steps)"
          echo ""
          echo "рЯУЦ See RESTORE-CLOUDFLARE.md for manual data restoration steps"
      
      - name: Provide manual restoration guidance
        run: |
          echo "рЯУЦ PRODUCTION DATA RESTORATION GUIDANCE"
          echo "======================================="
          echo ""
          echo "Current production backups use the legacy format."
          echo "For complete data restoration, you may need to:"
          echo ""
          echo "1. Use the backup-d1-data.sh script to export data from a recent backup"
          echo "2. Manually execute table-by-table restoration commands"
          echo "3. Verify data integrity after restoration"
          echo ""
          echo "рЯУЛ Available restoration files in this backup:"
          cd restore-workspace/cloudflare
          ls -la *.sh *.sql *.txt 2>/dev/null || echo "No restoration files found"
          echo ""
          echo "рЯЪ® RECOMMENDATION: Consider upgrading production backups to include"
          echo "   comprehensive data backup like the staging system before proceeding"
      
      - name: Verify basic connectivity
        run: |
          echo "рЯФН Verifying basic PRODUCTION database connectivity..."
          
          # Test basic database connectivity
          wrangler d1 execute librarycard-db --config=wrangler.prod.toml --env=production --remote --command="SELECT name FROM sqlite_master WHERE type='table';" || echo "Table list check failed"
          
          echo "вЬЕ Basic connectivity verified"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Cleanup
        if: always()
        run: |
          echo "рЯІє Cleaning up restore workspace..."
          rm -rf restore-workspace
          echo "вЬЕ Cleanup completed"
      
      - name: Log emergency restore
        if: always()
        run: |
          echo "рЯУЭ PRODUCTION RESTORE AUDIT LOG"
          echo "==============================="
          echo "Restore Date: $(date -u)"
          echo "Initiated by: ${{ github.actor }}"
          echo "Backup used: ${{ github.event.inputs.backup_tag }}"
          echo "Emergency reason: ${{ github.event.inputs.emergency_reason }}"
          echo "Status: ${{ job.status }}"
          echo ""
          echo "рЯЪ® This production restore event has been logged for audit purposes"
      
      - name: Notify on success
        run: |
          echo "вЬЕ PRODUCTION restore completed!"
          echo "рЯОѓ Backup restored from: ${{ github.event.inputs.backup_tag }}"
          echo "рЯУЛ CRITICAL NEXT STEPS:"
          echo "1. Verify production application is functioning"
          echo "2. Test critical user flows immediately"
          echo "3. Check data integrity thoroughly"
          echo "4. Monitor for any restoration issues"
          echo "5. Consider data restoration if schema-only restore was performed"
          echo ""
          echo "рЯЪ® PRODUCTION DATABASE RESTORE COMPLETED"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "вЭМ PRODUCTION restore FAILED!"
          echo "рЯЪ®рЯЪ®рЯЪ® PRODUCTION EMERGENCY рЯЪ®рЯЪ®рЯЪ®"
          echo ""
          echo "рЯУЛ IMMEDIATE ACTIONS REQUIRED:"
          echo "1. Check production application status"
          echo "2. Assess database state"
          echo "3. Consider emergency rollback using pre-restore backup"
          echo "4. Contact technical team immediately"
          echo "5. Review failure logs above"
          echo ""
          echo "рЯЖШ PRODUCTION DATABASE MAY BE IN INCONSISTENT STATE"
          echo "рЯЖШ IMMEDIATE TECHNICAL INTERVENTION REQUIRED"