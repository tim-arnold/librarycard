name: 🚀 Production Deployment

concurrency:
  group: deploy-production
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      deployment_type:
        description: 'Type of deployment'
        required: true
        type: choice
        default: 'worker-only'
        options:
          - worker-only
          - automated-migrations
          - full-deployment
          - frontend-only
      migration_dry_run:
        description: 'Run migration dry-run first (recommended)'
        required: false
        type: boolean
        default: true
      reason:
        description: 'Reason for production deployment'
        required: true
        type: string
      confirmation:
        description: 'Type CONFIRM-PRODUCTION to proceed'
        required: true
        type: string
      reviewer_acknowledgment:
        description: 'Reviewer name (if different from deployer)'
        required: false
        type: string

env:
  DEPLOYMENT_TIMESTAMP: ${{ github.run_id }}-${{ github.run_number }}

jobs:
  safety-validation:
    name: Production Safety Validation
    runs-on: ubuntu-latest
    environment: production-gate
    outputs:
      staging-verified: ${{ steps.staging-check.outputs.verified }}
      deployment-approved: ${{ steps.confirmation.outputs.approved }}
    
    steps:
      - name: Validate branch
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "❌ This workflow can only be run from the 'main' branch"
            echo "Current branch: ${{ github.ref_name }}"
            echo "Required branch: main"
            exit 1
          fi
          echo "✅ Branch validation passed: ${{ github.ref_name }}"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate confirmation input
        id: confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "CONFIRM-PRODUCTION" ]; then
            echo "❌ Deployment cancelled - exact confirmation required"
            echo "Expected: CONFIRM-PRODUCTION"
            echo "Received: ${{ github.event.inputs.confirmation }}"
            exit 1
          fi
          echo "✅ Confirmation validated"
          echo "approved=true" >> $GITHUB_OUTPUT

      - name: Validate deployment reason
        run: |
          if [ -z "${{ github.event.inputs.reason }}" ] || [ "${{ github.event.inputs.reason }}" = "" ]; then
            echo "❌ Deployment reason is required"
            exit 1
          fi
          if [ ${#REASON} -lt 10 ]; then
            echo "❌ Deployment reason must be at least 10 characters"
            exit 1
          fi
          echo "✅ Deployment reason validated: ${{ github.event.inputs.reason }}"
        env:
          REASON: ${{ github.event.inputs.reason }}

      - name: Check migration status
        if: github.event.inputs.deployment_type == 'automated-migrations' || github.event.inputs.deployment_type == 'full-deployment'
        run: |
          echo "🔍 Checking automated migration status for production..."
          export MIGRATION_ENV="production"
          
          if [[ "${{ github.event.inputs.migration_dry_run }}" == "true" ]]; then
            echo "🔍 Running migration dry-run preview..."
            npm run migrate:dry-run
          else
            echo "📋 Checking for pending migrations..."
            npm run migrate:status
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Check staging environment status
        id: staging-check
        run: |
          echo "🔍 Verifying staging environment health..."
          
          # Check if staging is accessible and responsive
          STAGING_URL="https://staging--libarycard.netlify.app"
          STAGING_API_URL="https://librarycard-api-staging.librarycard-staging.workers.dev"
          
          # Test frontend
          if curl -f -s --max-time 10 "$STAGING_URL" > /dev/null; then
            echo "✅ Staging frontend is accessible"
          else
            echo "❌ Staging frontend is not accessible"
            exit 1
          fi
          
          # Test API health
          if curl -f -s --max-time 10 "$STAGING_API_URL/health" > /dev/null; then
            echo "✅ Staging API is healthy"
          else
            echo "❌ Staging API is not responding"
            exit 1
          fi
          
          echo "✅ Staging environment verified"
          echo "verified=true" >> $GITHUB_OUTPUT

      - name: Log deployment attempt
        run: |
          echo "🚨 PRODUCTION DEPLOYMENT INITIATED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Initiated by: ${{ github.actor }}"
          echo "Deployment type: ${{ github.event.inputs.deployment_type }}"
          echo "Reason: ${{ github.event.inputs.reason }}"
          if [ -n "${{ github.event.inputs.reviewer_acknowledgment }}" ]; then
            echo "Reviewer: ${{ github.event.inputs.reviewer_acknowledgment }}"
          fi
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          if [ "${{ github.event.inputs.deployment_type }}" == "automated-migrations" ] || [ "${{ github.event.inputs.deployment_type }}" == "full-deployment" ]; then
            echo "Migration: Automated migration system with smart bootstrap"
            echo "Dry run: ${{ github.event.inputs.migration_dry_run }}"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  pre-deployment-backup:
    name: Create Pre-Deployment Backup
    runs-on: ubuntu-latest
    needs: safety-validation
    if: github.event.inputs.deployment_type == 'automated-migrations' || github.event.inputs.deployment_type == 'full-deployment'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            node_modules/.cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Create automated backup
        id: backup
        run: |
          echo "🔄 Creating pre-deployment backup..."
          BACKUP_REASON="pre-deployment-${{ env.DEPLOYMENT_TIMESTAMP }}"
          BACKUP_OUTPUT=$(npm run backup:create "$BACKUP_REASON" 2>&1)
          echo "$BACKUP_OUTPUT"
          
          # Extract the actual backup ID from the output
          BACKUP_ID=$(echo "$BACKUP_OUTPUT" | grep -o 'prod-backup-[0-9T:-]*Z' | head -1)
          if [ -z "$BACKUP_ID" ]; then
            echo "❌ Failed to extract backup ID from output"
            exit 1
          fi
          
          echo "✅ Backup created with ID: $BACKUP_ID"
          echo "backup_id=$BACKUP_ID" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify backup integrity
        run: |
          echo "🔍 Verifying backup integrity..."
          npm run backup:verify "${{ steps.backup.outputs.backup_id }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-worker:
    name: Deploy Worker to Production
    runs-on: ubuntu-latest
    needs: [safety-validation, pre-deployment-backup]
    if: always() && needs.safety-validation.result == 'success' && (needs.pre-deployment-backup.result == 'success' || needs.pre-deployment-backup.result == 'skipped') && (github.event.inputs.deployment_type == 'worker-only' || github.event.inputs.deployment_type == 'full-deployment')
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            node_modules/.cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build and validate
        run: |
          echo "🔨 Building application..."
          DISABLE_ESLINT_PLUGIN=true npx next build
          echo "🔍 ESLint disabled for production build"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --config=wrangler.prod.toml --env=production

      - name: Verify deployment
        run: |
          echo "🔍 Verifying production deployment..."
          sleep 10  # Wait for propagation
          
          # Test production health endpoint
          PROD_API_URL="https://librarycard-api-production.tim-arnold.workers.dev"
          if curl -f -s --max-time 15 "$PROD_API_URL/health" > /dev/null; then
            echo "✅ Production API deployment verified"
          else
            echo "❌ Production API health check failed"
            exit 1
          fi

  automated-migrations:
    name: Apply Automated Database Migrations
    runs-on: ubuntu-latest
    needs: [safety-validation, pre-deployment-backup, deploy-worker]
    if: always() && needs.safety-validation.result == 'success' && (needs.pre-deployment-backup.result == 'success' || needs.pre-deployment-backup.result == 'skipped') && ((github.event.inputs.deployment_type == 'automated-migrations') || (github.event.inputs.deployment_type == 'full-deployment' && (needs.deploy-worker.result == 'success' || needs.deploy-worker.result == 'skipped')))
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply automated migrations to production
        run: |
          echo "🚨 APPLYING AUTOMATED MIGRATIONS TO PRODUCTION"
          echo "🎯 Using smart bootstrap system for existing database"
          export MIGRATION_ENV="production"
          
          if [[ "${{ github.event.inputs.migration_dry_run }}" == "true" ]]; then
            echo "🔍 FINAL DRY RUN - Preview only, no changes"
            npm run migrate:dry-run
          else
            echo "💾 Applying automated migrations with smart bootstrap"
            npm run migrate:production
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify migration success
        if: github.event.inputs.migration_dry_run != 'true'
        run: |
          echo "🔍 Verifying automated migration completed successfully..."
          export MIGRATION_ENV="production"
          
          # Check final migration status
          npm run migrate:status
          
          # Enhanced health check with longer timeout for stability
          echo "🔍 Verifying production API health after migration..."
          sleep 15
          PROD_API_URL="https://librarycard-api-production.tim-arnold.workers.dev"
          if curl -f -s --max-time 30 "$PROD_API_URL/health" > /dev/null; then
            echo "✅ Production API is healthy after migration"
          else
            echo "❌ Production API unresponsive after migration"
            echo "🚨 Consider emergency rollback using backup/restore workflows"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Migration completion notification
        if: github.event.inputs.migration_dry_run != 'true'
        run: |
          echo "🎉 AUTOMATED DATABASE MIGRATION COMPLETED SUCCESSFULLY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Deployment type: ${{ github.event.inputs.deployment_type }}"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Initiated by: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
          if [ -n "${{ github.event.inputs.reason }}" ]; then
            echo "Reason: ${{ github.event.inputs.reason }}"
          fi
          echo "Migration system: Automated with smart bootstrap"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  deploy-frontend-full:
    name: Deploy Frontend (Full Deployment)
    runs-on: ubuntu-latest
    needs: [safety-validation, automated-migrations]
    if: github.event.inputs.deployment_type == 'full-deployment' && needs.safety-validation.result == 'success' && (needs.automated-migrations.result == 'success' || needs.automated-migrations.result == 'skipped')
    environment: production
    
    steps:
      - name: Validate full deployment frontend trigger
        run: |
          echo "🎯 FRONTEND DEPLOYMENT - FULL DEPLOYMENT MODE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "This is the frontend component of a full deployment:"
          echo "✅ Worker deployment completed"
          echo "✅ Database migrations completed (if applicable)"
          echo "🚀 Now deploying frontend to complete full deployment"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Trigger Netlify frontend build
        run: |
          if [[ "${{ github.event.inputs.migration_dry_run }}" == "true" ]]; then
            echo "🔍 DRY RUN MODE - Frontend deployment preview"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "In actual deployment, this would:"
            echo "✅ Trigger Netlify production build hook"
            echo "✅ Wait for build completion (~3 minutes)"
            echo "✅ Verify frontend deployment"
            echo "✅ Complete full deployment sequence"
            echo ""
            echo "Netlify build hook: ${{ secrets.NETLIFY_PROD_BUILD_HOOK != '' && '***configured***' || '❌ NOT CONFIGURED' }}"
            echo "Production frontend: https://librarycard.tim52.io"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔍 DRY RUN COMPLETE - No actual deployment triggered"
          else
            echo "🚀 Triggering Netlify production frontend build..."
            
            if [ -z "${{ secrets.NETLIFY_PROD_BUILD_HOOK }}" ]; then
              echo "❌ NETLIFY_PROD_BUILD_HOOK secret not configured"
              echo "Please add the Netlify build hook URL to GitHub Secrets"
              exit 1
            fi
            
            # Trigger the build
            BUILD_RESPONSE=$(curl -X POST -s -w "HTTP_STATUS:%{http_code}" "${{ secrets.NETLIFY_PROD_BUILD_HOOK }}")
            HTTP_STATUS=$(echo $BUILD_RESPONSE | grep -o "HTTP_STATUS:[0-9]*" | cut -d: -f2)
            
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "✅ Netlify build triggered successfully"
            else
              echo "❌ Failed to trigger Netlify build (HTTP $HTTP_STATUS)"
              echo "Response: $BUILD_RESPONSE"
              echo "⚠️  Backend deployment completed successfully but frontend deployment failed"
              exit 1
            fi
          fi

      - name: Wait for build completion
        run: |
          if [[ "${{ github.event.inputs.migration_dry_run }}" == "true" ]]; then
            echo "🔍 DRY RUN MODE - Simulating build wait"
            echo "In actual deployment, would wait ~3 minutes for Netlify build completion"
          else
            echo "⏳ Waiting for Netlify build to complete..."
            echo "Build time estimate: 2-3 minutes"
            
            # Wait for build completion (initial implementation: fixed wait)
            sleep 180  # 3 minutes
            
            echo "✅ Build wait period completed"
          fi

      - name: Verify frontend deployment
        run: |
          if [[ "${{ github.event.inputs.migration_dry_run }}" == "true" ]]; then
            echo "🔍 DRY RUN MODE - Simulating frontend verification"
            echo "In actual deployment, would verify https://librarycard.tim52.io is accessible"
            echo "✅ DRY RUN: Frontend verification would succeed"
          else
            echo "🔍 Verifying production frontend deployment..."
            
            PROD_FRONTEND="https://librarycard.tim52.io"
            MAX_RETRIES=5
            RETRY_COUNT=0
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f -s --max-time 15 "$PROD_FRONTEND" > /dev/null; then
                echo "✅ Production frontend accessible and responding"
                break
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo "⏳ Frontend not ready yet, retrying in 30 seconds... (attempt $RETRY_COUNT/$MAX_RETRIES)"
                  sleep 30
                else
                  echo "❌ Frontend verification failed after $MAX_RETRIES attempts"
                  echo "⚠️  Backend deployment completed but frontend deployment failed"
                  echo "Check Netlify dashboard: https://app.netlify.com"
                  exit 1
                fi
              fi
            done
          fi

      - name: Full deployment frontend success
        run: |
          echo "🎉 FULL DEPLOYMENT FRONTEND COMPONENT COMPLETED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Worker deployment: COMPLETED"
          echo "✅ Database migrations: COMPLETED"
          echo "✅ Frontend deployment: COMPLETED" 
          echo ""
          echo "Full deployment successful!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  deploy-frontend-only:
    name: Deploy Frontend to Production
    runs-on: ubuntu-latest
    needs: safety-validation
    if: github.event.inputs.deployment_type == 'frontend-only' && needs.safety-validation.result == 'success'
    environment: production
    
    steps:
      - name: Validate frontend-only deployment
        run: |
          echo "🎯 FRONTEND-ONLY DEPLOYMENT TO PRODUCTION"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "This deployment will:"
          echo "✅ Trigger Netlify frontend build"
          echo "✅ Deploy latest frontend code to production"
          echo "❌ NOT deploy worker changes"
          echo "❌ NOT run database migrations"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Trigger Netlify frontend build
        run: |
          if [[ "${{ github.event.inputs.migration_dry_run }}" == "true" ]]; then
            echo "🔍 DRY RUN MODE - Frontend-only deployment preview"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "In actual deployment, this would:"
            echo "✅ Trigger Netlify production build hook"
            echo "✅ Wait for build completion (~3 minutes)"
            echo "✅ Verify frontend deployment"
            echo "❌ NOT deploy worker changes"
            echo "❌ NOT run database migrations"
            echo ""
            echo "Netlify build hook: ${{ secrets.NETLIFY_PROD_BUILD_HOOK != '' && '***configured***' || '❌ NOT CONFIGURED' }}"
            echo "Production frontend: https://librarycard.tim52.io"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔍 DRY RUN COMPLETE - No actual deployment triggered"
          else
            echo "🚀 Triggering Netlify production frontend build..."
            
            if [ -z "${{ secrets.NETLIFY_PROD_BUILD_HOOK }}" ]; then
              echo "❌ NETLIFY_PROD_BUILD_HOOK secret not configured"
              echo "Please add the Netlify build hook URL to GitHub Secrets"
              exit 1
            fi
            
            # Trigger the build
            BUILD_RESPONSE=$(curl -X POST -s -w "HTTP_STATUS:%{http_code}" "${{ secrets.NETLIFY_PROD_BUILD_HOOK }}")
            HTTP_STATUS=$(echo $BUILD_RESPONSE | grep -o "HTTP_STATUS:[0-9]*" | cut -d: -f2)
            
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "✅ Netlify build triggered successfully"
            else
              echo "❌ Failed to trigger Netlify build (HTTP $HTTP_STATUS)"
              echo "Response: $BUILD_RESPONSE"
              exit 1
            fi
          fi

      - name: Wait for build completion
        run: |
          if [[ "${{ github.event.inputs.migration_dry_run }}" == "true" ]]; then
            echo "🔍 DRY RUN MODE - Simulating build wait"
            echo "In actual deployment, would wait ~3 minutes for Netlify build completion"
          else
            echo "⏳ Waiting for Netlify build to complete..."
            echo "Build time estimate: 2-3 minutes"
            
            sleep 180  # 3 minutes
            
            echo "✅ Build wait period completed"
          fi

      - name: Verify frontend deployment
        run: |
          if [[ "${{ github.event.inputs.migration_dry_run }}" == "true" ]]; then
            echo "🔍 DRY RUN MODE - Simulating frontend verification"
            echo "In actual deployment, would verify https://librarycard.tim52.io is accessible"
            echo "✅ DRY RUN: Frontend verification would succeed"
          else
            echo "🔍 Verifying production frontend deployment..."
            
            PROD_FRONTEND="https://librarycard.tim52.io"
            MAX_RETRIES=5
            RETRY_COUNT=0
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f -s --max-time 15 "$PROD_FRONTEND" > /dev/null; then
                echo "✅ Production frontend accessible and responding"
                break
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo "⏳ Frontend not ready yet, retrying in 30 seconds... (attempt $RETRY_COUNT/$MAX_RETRIES)"
                  sleep 30
                else
                  echo "❌ Frontend verification failed after $MAX_RETRIES attempts"
                  echo "The build may have failed or is taking longer than expected"
                  echo "Check Netlify dashboard: https://app.netlify.com"
                  exit 1
                fi
              fi
            done
          fi

      - name: Frontend deployment success
        run: |
          echo "🎉 FRONTEND DEPLOYMENT COMPLETED SUCCESSFULLY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Frontend URL: https://librarycard.tim52.io"
          echo "Deployment type: frontend-only"
          echo "Completed at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Deployed by: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  post-deployment-verification:
    name: Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: [deploy-worker, automated-migrations, deploy-frontend-full, deploy-frontend-only]
    if: always() && (((needs.deploy-worker.result == 'success' || needs.deploy-worker.result == 'skipped') && (needs.automated-migrations.result == 'success' || needs.automated-migrations.result == 'skipped') && (needs.deploy-worker.result == 'success' || needs.automated-migrations.result == 'success')) || (needs.deploy-frontend-only.result == 'success') || (needs.deploy-frontend-full.result == 'success'))
    environment: production
    
    steps:
      - name: Comprehensive production health check
        run: |
          echo "🔍 Running comprehensive production verification..."
          
          PROD_FRONTEND="https://librarycard.tim52.io"
          PROD_API="https://librarycard-api-production.tim-arnold.workers.dev"
          
          # Test frontend
          if curl -f -s --max-time 15 "$PROD_FRONTEND" > /dev/null; then
            echo "✅ Production frontend accessible"
          else
            echo "❌ Production frontend accessibility issue"
            exit 1
          fi
          
          # Test API endpoints
          if curl -f -s --max-time 15 "$PROD_API/health" > /dev/null; then
            echo "✅ Production API health endpoint responsive"
          else
            echo "❌ Production API health endpoint issue"
            exit 1
          fi
          
          echo "✅ All production verification checks passed"

      - name: Deployment success notification
        run: |
          echo "🎉 PRODUCTION DEPLOYMENT COMPLETED SUCCESSFULLY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Deployment type: ${{ github.event.inputs.deployment_type }}"
          echo "Completed at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Deployed by: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  rollback-instructions:
    name: Rollback Instructions
    runs-on: ubuntu-latest
    needs: [deploy-worker, automated-migrations, deploy-frontend-full, deploy-frontend-only]
    if: failure()
    
    steps:
      - name: Display rollback instructions
        run: |
          echo "🚨 DEPLOYMENT FAILED - ROLLBACK INSTRUCTIONS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "1. Check the failed job logs above for specific error details"
          echo ""
          echo "Frontend Rollback:"
          echo "- Go to Netlify Dashboard: https://app.netlify.com"
          echo "- Navigate to LibraryCard production site"
          echo "- Click 'Deploys' → Find last successful deploy → Click 'Publish deploy'"
          echo "- Frontend rollback is immediate and safe"
          echo ""
          echo "Backend Rollback:"
          echo "- If database migration failed, use emergency restore: npm run backup:restore" 
          echo "- If worker deployment failed, previous version should still be active"
          echo ""
          echo "Deployment Type Specific:"
          if [[ "${{ github.event.inputs.deployment_type }}" == "frontend-only" ]]; then
            echo "- Frontend-only deployment failed - no backend changes were made"
            echo "- Only frontend rollback needed (see Netlify instructions above)"
          elif [[ "${{ github.event.inputs.deployment_type }}" == "full-deployment" ]]; then
            echo "- Full deployment failed - may need both frontend and backend rollback"
            echo "- Check which component failed and rollback accordingly"
          else
            echo "- Backend deployment failed - frontend should be unaffected"
          fi
          echo ""
          echo "Emergency assistance: docs/production/emergency-procedures.md"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"