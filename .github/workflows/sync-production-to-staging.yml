name: Production Sync Data to Staging

on:
  workflow_dispatch:
    inputs:
      backup_tag:
        description: 'GitHub Release tag of the PRODUCTION backup to sync to staging (e.g., cf-backup-123-20250817)'
        required: true
        type: string
      sync_reason:
        description: 'Reason for syncing production data to staging'
        required: true
        type: string
        default: 'Sync staging with production data for testing'

permissions:
  contents: read
  
jobs:
  sync-production-to-staging:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔄 PRODUCTION TO STAGING SYNC
        run: |
          echo "🔄📦🔄📦🔄📦🔄📦🔄📦🔄📦🔄📦🔄📦🔄📦🔄📦"
          echo "📦                                                📦"
          echo "📦         SYNCING PRODUCTION TO STAGING         📦"
          echo "📦                                                📦"
          echo "📦  - Downloads PRODUCTION backup data            📦"
          echo "📦  - Extracts LIVE production database schema   📦"
          echo "📦  - DROPS and RECREATES staging database       📦"
          echo "📦  - Creates staging backup before sync          📦"
          echo "📦  - Syncs all production data to fresh staging 📦"
          echo "📦                                                📦"
          echo "🔄📦🔄📦🔄📦🔄📦🔄📦🔄📦🔄📦🔄📦🔄📦🔄📦"
          echo ""
          echo "📋 Sync Details:"
          echo "   Backup Tag: ${{ github.event.inputs.backup_tag }}"
          echo "   Sync Reason: ${{ github.event.inputs.sync_reason }}"
          echo "   Target: STAGING environment"
          echo "   Purpose: Complete production data sync"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create sync workspace
        run: |
          echo "📁 Creating sync workspace..."
          mkdir -p sync-workspace
          cd sync-workspace

      - name: Download production backup from GitHub release
        run: |
          echo "📦 Downloading production backup from GitHub release: ${{ github.event.inputs.backup_tag }}"
          cd sync-workspace
          
          # Download the release
          gh release download "${{ github.event.inputs.backup_tag }}" --pattern "*.tar.gz" --pattern "*.zip"
          
          # List what we downloaded
          echo "📋 Downloaded files:"
          ls -la
          
          # Extract the first archive found
          if ls *.tar.gz 1> /dev/null 2>&1; then
            echo "📦 Extracting tar.gz archive..."
            tar -xzf *.tar.gz
          elif ls *.zip 1> /dev/null 2>&1; then
            echo "📦 Extracting zip archive..."
            unzip *.zip
          else
            echo "❌ No archive files found"
            exit 1
          fi
          
          echo "📋 Extracted contents:"
          find . -name "*.json" -o -name "*.sql" | head -10
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify production backup contents
        run: |
          echo "🔍 Verifying production backup contents..."
          cd sync-workspace
          
          # Look for the production backup JSON file
          BACKUP_FILE=$(find . -name "prod-backup-*.json" | head -1)
          
          if [ -z "$BACKUP_FILE" ]; then
            echo "❌ Production backup JSON file not found"
            echo "📋 Available files:"
            find . -name "*.json" | head -10
            exit 1
          fi
          
          echo "✅ Found production backup: $BACKUP_FILE"
          
          # Verify backup integrity
          echo "📊 Backup file size: $(ls -lh "$BACKUP_FILE" | awk '{print $5}')"
          
          # Parse backup metadata
          echo "📋 Backup metadata:"
          cat "$BACKUP_FILE" | jq -r '.id, .timestamp, .reason' | head -3
          
          # Count tables and rows
          TABLES=$(cat "$BACKUP_FILE" | jq '.tables | keys | length')
          echo "📊 Tables in backup: $TABLES"
          
          TOTAL_ROWS=$(cat "$BACKUP_FILE" | jq '[.tables[] | select(.row_count) | .row_count] | add')
          echo "📊 Total rows in backup: $TOTAL_ROWS"

      - name: Use local schema.sql (production schema extraction has issues)
        run: |
          echo "📋 Using local schema.sql file instead of extracting from production..."
          echo "⚠️  Production schema extraction missing critical tables (books, etc.)"
          echo "✅ Local schema.sql contains complete table definitions"
          
          # Verify local schema.sql exists and contains books table
          if [ -f "schema.sql" ]; then
            echo "✅ Found local schema.sql file"
            
            # Check for books table
            if grep -q "CREATE TABLE.*books" schema.sql; then
              echo "✅ Books table found in local schema.sql"
            else
              echo "❌ Books table missing from local schema.sql - this is a problem!"
              exit 1
            fi
            
            # Count tables in local schema
            TABLE_COUNT=$(grep -c "CREATE TABLE" schema.sql)
            echo "📊 Local schema contains $TABLE_COUNT table definitions"
            
            echo "📋 Schema file preview:"
            head -20 schema.sql
            
          else
            echo "❌ Local schema.sql file not found!"
            echo "❌ Cannot proceed with staging sync without proper schema"
            exit 1
          fi

      - name: Prepare backup files for sync script
        run: |
          echo "📦 Preparing backup files for sync script..."
          cd sync-workspace/cloudflare
          
          # Create backups-production directory and copy backup files
          mkdir -p ../../cloudflare
          
          # Copy backup files
          cp -r * ../../cloudflare/
          
          echo "✅ Backup files prepared for sync script"

      - name: Execute complete production to staging sync
        run: |
          echo "🔄 Executing COMPLETE production to staging sync..."
          echo "🎯 Target: STAGING environment"
          echo "📦 Source: PRODUCTION backup data (ALL ROWS)"
          
          # Update the sync script to include system user creation
          cat > complete_sync_script.js << 'EOF'
          const { execSync } = require('child_process');
          const { readFileSync, writeFileSync, existsSync } = require('fs');
          const { join } = require('path');
          
          // Load environment variables
          require('dotenv').config({ path: '.env.local' });
          
          async function syncProductionToStaging() {
            console.log('🔄 COMPLETE PRODUCTION TO STAGING SYNC 🔄\n');
            
            // Find the production backup file dynamically
            const fs = require('fs');
            const path = require('path');
            
            let backupFile = null;
            
            // Check multiple possible locations for production backup
            const possiblePaths = [
              './cloudflare/',
              './',
              './sync-workspace/cloudflare/',
              './sync-workspace/'
            ];
            
            for (const dir of possiblePaths) {
              if (fs.existsSync(dir)) {
                const files = fs.readdirSync(dir);
                const prodBackup = files.find(file => file.includes('prod-backup-') && file.endsWith('.json'));
                if (prodBackup) {
                  backupFile = path.join(dir, prodBackup);
                  break;
                }
              }
            }
            
            if (!backupFile) {
              console.log('🔍 Available files for debugging:');
              possiblePaths.forEach(dir => {
                if (fs.existsSync(dir)) {
                  console.log(`${dir}:`, fs.readdirSync(dir));
                }
              });
              throw new Error('No production backup file found in any expected location');
            }
            
            if (!existsSync(backupFile)) {
              console.error('❌ Production backup file not found:', backupFile);
              process.exit(1);
            }
            
            console.log('📦 Found production backup:', backupFile);
            
            // Load and verify backup
            const backupData = JSON.parse(readFileSync(backupFile, 'utf8'));
            console.log(`📅 Backup from: ${backupData.timestamp}`);
            console.log(`📊 Total tables: ${Object.keys(backupData.tables).length}`);
            
            let totalRows = 0;
            for (const [tableName, tableData] of Object.entries(backupData.tables)) {
              if (!tableData.error && tableData.row_count) {
                totalRows += tableData.row_count;
              }
            }
            console.log(`📊 Total rows to sync: ${totalRows}\n`);
            
            // TEMPORARILY DISABLED: Create staging backup for faster debugging
            console.log('⏭️  Skipping staging backup creation for faster debugging...');
            // try {
            //   execSync('node scripts/backup-staging.js create "pre-complete-prod-sync"', { 
            //     stdio: 'inherit',
            //     env: { ...process.env, CLOUDFLARE_API_TOKEN: process.env.CLOUDFLARE_API_TOKEN_STAGING_NEW }
            //   });
            //   console.log('✅ Staging backup created\n');
            // } catch (error) {
            //   console.error('❌ Failed to create staging backup:', error.message);
            //   process.exit(1);
            // }
            
            // Define table order for sync - CORRECTED DEPENDENCY ORDER
            // Parent tables FIRST (referenced by others), then children
            const tableOrder = [
              // Core parent tables (no dependencies)
              'users', 'locations', 'curated_genres',
              // Tables that depend on core parents
              'shelves', 'books',
              // Tables that depend on books/users (child tables)
              'book_genres', 'book_ratings', 'book_removal_requests', 'book_checkout_history',
              // Location-related tables
              'location_user_permissions', 'location_admin_capabilities', 'location_members', 'location_invitations',
              // User-related tables
              'signup_approval_requests', 'webauthn_credentials', 'webauthn_challenges',
              // Notification tables
              'notification_queue', 'notification_log', 'notification_read_status', 'notification_preferences',
              'in_app_notifications',
              // System tables
              'jwt_sessions', 'auth_audit_log', 'user_recovery_codes', 'user_global_permissions',
              'genre_suggestions', 'genre_requests',
              // Migration system tables (can be last)
              'migration_batches', 'migrations_applied', 'migration_rollbacks'
            ];
            
            // Define tables to skip (legacy/orphaned/problematic tables)
            const skipTables = [
              'sqlite_sequence',
              'sqlite_master'
            ];
            
            console.log('🗑️💥 DROPPING AND RECREATING STAGING DATABASE...');
            console.log('    This is faster and more reliable than clearing individual tables');
            
            // First, get the current database structure for recreation
            console.log('    📋 Getting staging database structure...');
            let dbSchema = '';
            try {
              const schemaResult = executeStagingD1Command("SELECT sql FROM sqlite_master WHERE type='table' AND sql IS NOT NULL ORDER BY name;");
              
              // Parse the schema from the result
              const lines = schemaResult.split('\n');
              const jsonStart = lines.findIndex(line => line.trim().startsWith('['));
              if (jsonStart !== -1) {
                const jsonText = lines.slice(jsonStart).join('\n');
                const data = JSON.parse(jsonText);
                
                if (Array.isArray(data) && data[0] && data[0].results) {
                  data[0].results.forEach(row => {
                    if (row.sql) {
                      dbSchema += row.sql + ';\n';
                    }
                  });
                }
              }
              console.log('    ✅ Database schema captured');
            } catch (error) {
              console.log('    ⚠️  Could not capture schema, will rely on built-in schema');
            }
            
            // Drop all tables (this is much faster than individual DELETEs)
            console.log('    💥 Dropping all existing tables...');
            const tablesNotDropped = [];
            try {
              const tablesResult = executeStagingD1Command("SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%';");
              
              // Parse table names
              const lines = tablesResult.split('\n');
              const jsonStart = lines.findIndex(line => line.trim().startsWith('['));
              if (jsonStart !== -1) {
                const jsonText = lines.slice(jsonStart).join('\n');
                const data = JSON.parse(jsonText);
                
                if (Array.isArray(data) && data[0] && data[0].results) {
                  const tableNames = data[0].results.map(row => row.name);
                  console.log(`    🎯 Found ${tableNames.length} tables to drop`);
                  
                  // Drop all tables, tracking which ones fail
                  for (const tableName of tableNames) {
                    try {
                      executeStagingD1Command(`DROP TABLE IF EXISTS ${tableName};`);
                      console.log(`    💥 Dropped ${tableName}`);
                    } catch (error) {
                      console.log(`    ⚠️  Could not drop ${tableName}: ${error.message}`);
                      tablesNotDropped.push(tableName);
                    }
                  }
                }
              }
              
              if (tablesNotDropped.length > 0) {
                console.log(`    ⚠️  ${tablesNotDropped.length} tables could not be dropped due to permissions`);
                console.log(`    🧹 Will clear data from these tables instead: ${tablesNotDropped.join(', ')}`);
              } else {
                console.log('    ✅ All tables dropped successfully');
              }
            } catch (error) {
              console.log(`    ⚠️  Table drop had issues: ${error.message}`);
            }
            
            // Clear data from tables that couldn't be dropped
            if (tablesNotDropped.length > 0) {
              console.log('    🧹 Clearing data from tables that could not be dropped...');
              for (const tableName of tablesNotDropped) {
                try {
                  executeStagingD1Command(`DELETE FROM ${tableName};`);
                  console.log(`    🧹 Cleared data from ${tableName}`);
                } catch (error) {
                  console.log(`    ⚠️  Could not clear ${tableName}: ${error.message}`);
                }
              }
            }
            
            // Recreate database structure using individual table creation
            console.log('    🏗️  Creating tables individually from schema.sql...');
            try {
              const fs = require('fs');
              const path = require('path');
              const schemaPath = path.join('.', 'schema.sql');
              
              if (fs.existsSync(schemaPath)) {
                console.log('    📋 Reading schema.sql file...');
                const schemaContent = fs.readFileSync(schemaPath, 'utf8');
                
                // Extract individual CREATE TABLE statements
                const createStatements = schemaContent.match(/CREATE TABLE[^;]+;/gi) || [];
                console.log(`    🎯 Found ${createStatements.length} CREATE TABLE statements`);
                
                let createdTables = 0;
                let failedTables = 0;
                
                for (const createStatement of createStatements) {
                  const tableName = createStatement.match(/CREATE TABLE (?:IF NOT EXISTS )?(\w+)/i)?.[1];
                  if (tableName) {
                    try {
                      console.log(`    🏗️  Creating table: ${tableName}...`);
                      
                      // Create temporary SQL file for individual table
                      const tempFile = `./create_${tableName}_${Date.now()}.sql`;
                      fs.writeFileSync(tempFile, createStatement);
                      
                      const result = execSync(`npx wrangler d1 execute librarycard-db-staging-new --config=wrangler.staging-new.toml --env=staging --remote --file="${tempFile}"`, {
                        encoding: 'utf8',
                        env: { ...process.env, CLOUDFLARE_API_TOKEN: process.env.CLOUDFLARE_API_TOKEN_STAGING_NEW }
                      });
                      
                      fs.unlinkSync(tempFile);
                      console.log(`    ✅ Successfully created table: ${tableName}`);
                      createdTables++;
                      
                    } catch (error) {
                      console.log(`    ❌ FAILED to create table: ${tableName}`);
                      console.log(`       Error: ${error.message}`);
                      console.log(`       SQL preview: ${createStatement.substring(0, 150)}...`);
                      failedTables++;
                    }
                  }
                }
                
                console.log(`    📊 Table creation summary: ${createdTables} created, ${failedTables} failed`);
                
                if (failedTables > 0) {
                  console.log(`    ⚠️  ${failedTables} tables failed to create - will attempt dynamic creation during sync`);
                } else {
                  console.log(`    🎉 All tables created successfully!`);
                }
                
              } else {
                console.log('    ⚠️  schema.sql not found, tables will be created as data is synced');
              }
            } catch (error) {
              console.log(`    ❌ Schema recreation had critical issues: ${error.message}`);
              console.log(`    🔄 Will attempt dynamic table creation during sync`);
            }
            
            // Create system user for curated_genres foreign key constraint
            console.log('\n👤 Creating system user for curated_genres...');
            try {
              // Use INSERT OR IGNORE to handle existing system user gracefully
              const systemUserSql = `INSERT OR IGNORE INTO users (id, email, first_name, last_name, created_at, updated_at, password_hash, auth_provider, email_verified, user_role) VALUES ('system', 'system@library.local', 'System', 'User', '2025-01-01 00:00:00', '2025-01-01 00:00:00', NULL, 'system', 1, 'admin');`;
              const tempFile = `./system_user_${Date.now()}.sql`;
              const fs = require('fs');
              fs.writeFileSync(tempFile, systemUserSql);
              
              const result = execSync(`npx wrangler d1 execute librarycard-db-staging-new --config=wrangler.staging-new.toml --env=staging --remote --file="${tempFile}"`, {
                encoding: 'utf8',
                env: { ...process.env, CLOUDFLARE_API_TOKEN: process.env.CLOUDFLARE_API_TOKEN_STAGING_NEW }
              });
              
              fs.unlinkSync(tempFile);
              console.log('  ✅ System user created (or already exists)');
            } catch (error) {
              console.log('  ⚠️  System user creation had issues, will skip foreign key dependent tables if needed');
              console.log(`  📋 Error: ${error.message}`);
            }
            
            console.log('\n📥 Syncing ALL production data to staging...');
            
            // DISABLE foreign key constraints during sync
            console.log('🔧 Disabling foreign key constraints for bulk sync...');
            try {
              executeStagingD1Command('PRAGMA foreign_keys = OFF;');
              console.log('✅ Foreign key constraints disabled');
            } catch (error) {
              console.log('⚠️  Could not disable foreign key constraints:', error.message);
            }
            
            // Sync in correct order: parents first, then children  
            // tableOrder is now defined with parents first, so use as-is
            const syncOrder = [...tableOrder];
            
            console.log('📋 Sync order (parents first):');
            syncOrder.forEach((table, idx) => {
              console.log(`  ${idx + 1}. ${table}`);
            });
            
            // Debug: Check which tables have data in the backup
            console.log('\n🔍 COMPREHENSIVE BACKUP DATA ANALYSIS:');
            const tablesWithData = [];
            const tablesWithoutData = [];
            const criticalMissingTables = [];
            
            // Critical tables that must be synced for app to work
            const criticalTables = ['users', 'locations', 'books', 'curated_genres'];
            
            // First, show ALL tables in backup for debugging
            console.log('📋 ALL TABLES IN BACKUP DATA:');
            const allBackupTables = Object.keys(backupData.tables || {});
            allBackupTables.forEach((tableName, idx) => {
              const tableData = backupData.tables[tableName];
              const hasData = tableData && !tableData.error && tableData.data && tableData.data.length > 0;
              const rowCount = hasData ? tableData.data.length : 0;
              const status = tableData?.error ? `ERROR: ${tableData.error}` : (hasData ? 'OK' : 'EMPTY');
              console.log(`  ${idx + 1}. ${tableName}: ${rowCount} rows (${status})`);
            });
            
            // Analyze critical tables specifically
            console.log('\n🚨 CRITICAL TABLES ANALYSIS:');
            criticalTables.forEach(tableName => {
              const tableData = backupData.tables[tableName];
              if (tableData) {
                if (tableData.error) {
                  console.log(`❌ ${tableName}: ERROR - ${tableData.error}`);
                  criticalMissingTables.push(tableName);
                } else if (!tableData.data || tableData.data.length === 0) {
                  console.log(`📭 ${tableName}: 0 rows (EMPTY)`);
                  criticalMissingTables.push(tableName);
                } else {
                  console.log(`✅ ${tableName}: ${tableData.data.length} rows (OK)`);
                }
              } else {
                console.log(`❌ ${tableName}: TABLE NOT FOUND IN BACKUP`);
                criticalMissingTables.push(tableName);
              }
            });
            
            if (criticalMissingTables.length > 0) {
              console.log(`\n🚨 CRITICAL ISSUE: ${criticalMissingTables.length} essential tables missing!`);
              console.log(`🚨 Missing critical tables: ${criticalMissingTables.join(', ')}`);
              console.log(`🚨 App will NOT work without these tables!`);
              console.log(`🚨 This suggests the backup process may be incomplete.`);
            } else {
              console.log(`\n✅ All critical tables present in backup data`);
            }
            
            for (const tableName of syncOrder) {
              const tableData = backupData.tables[tableName];
              if (tableData && !tableData.error && tableData.data && tableData.data.length > 0) {
                tablesWithData.push(`${tableName}(${tableData.data.length})`);
              } else {
                tablesWithoutData.push(tableName);
                if (criticalTables.includes(tableName)) {
                  criticalMissingTables.push(tableName);
                }
              }
            }
            
            console.log(`✅ Tables WITH data: ${tablesWithData.join(', ')}`);
            console.log(`❌ Tables WITHOUT data: ${tablesWithoutData.join(', ')}`);
            
            if (criticalMissingTables.length > 0) {
              console.log(`🚨 CRITICAL MISSING TABLES: ${criticalMissingTables.join(', ')}`);
              console.log(`🚨 These tables are essential for app functionality!`);
            }
            
            let syncedTables = 0;
            let syncedRows = 0;
            
            for (const tableName of syncOrder) {
              const tableData = backupData.tables[tableName];
              
              // Debug logging for critical tables
              if (tableName === 'books') {
                console.log(`🚨 CRITICAL TABLE DEBUG - books:`);
                console.log(`  - skipTables includes books: ${skipTables.includes(tableName)}`);
                console.log(`  - tableData exists: ${!!tableData}`);
                console.log(`  - tableData.error: ${tableData?.error || 'none'}`);
                console.log(`  - tableData.data exists: ${!!tableData?.data}`);
                console.log(`  - tableData.data.length: ${tableData?.data?.length || 0}`);
              }
              
              // Skip tables that don't exist in staging or are legacy/orphaned
              if (skipTables.includes(tableName)) {
                console.log(`    ⏭️  Skipping ${tableName} (legacy/orphaned table)`);
                continue;
              }
              
              if (!tableData || tableData.error || !tableData.data || tableData.data.length === 0) {
                if (tableName === 'books') {
                  console.log(`🚨 CRITICAL: books table being skipped due to missing data!`);
                }
                continue;
              }
              
              console.log(`    📥 Syncing ${tableName} (${tableData.data.length} rows)...`);
              
              try {
                // Check if table exists and create it if missing
                let tableReady = false;
                try {
                  const checkResult = executeStagingD1Command(`SELECT 1 FROM ${tableName} LIMIT 1;`);
                  tableReady = true;
                  console.log(`    ✅ Table ${tableName} exists and ready`);
                } catch (tableCheckError) {
                  console.log(`    🔍 Table check failed for ${tableName}: ${tableCheckError.message}`);
                  
                  // The wrangler error message might not contain SQLite details directly
                  // If the command failed, assume the table doesn't exist and try to create it
                  if (tableCheckError.message.includes('Command failed') || 
                      tableCheckError.message.includes('no such table') || 
                      tableCheckError.message.includes('SQLITE_ERROR')) {
                    console.log(`    🏗️  Table ${tableName} missing, attempting to create from schema...`);
                    
                    // Try to extract and execute just this table's CREATE statement from schema.sql
                    try {
                      const fs = require('fs');
                      const schemaContent = fs.readFileSync('schema.sql', 'utf8');
                      
                      // Find the CREATE TABLE statement for this specific table
                      const tableRegex = new RegExp(`CREATE TABLE ${tableName}\\s*\\([^;]+\\);`, 'is');
                      const tableMatch = schemaContent.match(tableRegex);
                      
                      if (tableMatch) {
                        let createTableSql = tableMatch[0];
                        console.log(`    📋 Found CREATE statement for ${tableName}`);
                        
                        // For problematic tables, remove foreign key constraints temporarily
                        if (['book_ratings', 'book_checkout_history', 'book_removal_requests', 'book_genres'].includes(tableName)) {
                          console.log(`    🔧 Removing foreign key constraints from ${tableName} for sync`);
                          console.log(`    🔍 Original SQL length: ${createTableSql.length}`);
                          
                          // More careful regex to remove REFERENCES without breaking syntax
                          // Remove REFERENCES clauses (but preserve column definition)
                          createTableSql = createTableSql.replace(/\s+REFERENCES\s+\w+\s*\([^)]+\)(\s+[A-Z\s]+)?/gi, '');
                          
                          // Remove standalone FOREIGN KEY constraints (full constraint lines)
                          createTableSql = createTableSql.replace(/,\s*CONSTRAINT\s+\w+\s+FOREIGN\s+KEY\s*\([^)]+\)\s+REFERENCES\s+\w+\s*\([^)]+\)(\s+[A-Z\s]+)?/gi, '');
                          createTableSql = createTableSql.replace(/,\s*FOREIGN\s+KEY\s*\([^)]+\)\s+REFERENCES\s+\w+\s*\([^)]+\)(\s+[A-Z\s]+)?/gi, '');
                          
                          // Clean up any double commas
                          createTableSql = createTableSql.replace(/,\s*,/g, ',');
                          // Clean up trailing commas before closing parenthesis
                          createTableSql = createTableSql.replace(/,\s*\)/g, ')');
                          
                          console.log(`    🔍 Modified SQL length: ${createTableSql.length}`);
                          console.log(`    🔍 Modified SQL preview: ${createTableSql.substring(0, 200)}...`);
                        }
                        
                        // Create temporary SQL file and execute it
                        const tempFile = `./create_${tableName}_${Date.now()}.sql`;
                        fs.writeFileSync(tempFile, createTableSql);
                        
                        const result = execSync(`npx wrangler d1 execute librarycard-db-staging-new --config=wrangler.staging-new.toml --env=staging --remote --file="${tempFile}"`, {
                          encoding: 'utf8',
                          env: { ...process.env, CLOUDFLARE_API_TOKEN: process.env.CLOUDFLARE_API_TOKEN_STAGING_NEW }
                        });
                        fs.unlinkSync(tempFile);
                        
                        console.log(`    ✅ Created missing table: ${tableName}`);
                        tableReady = true;
                      } else {
                        console.log(`    ⚠️  Could not find CREATE statement for ${tableName} in schema`);
                        console.log(`    ⏭️  Skipping ${tableName} - cannot be created`);
                        continue;
                      }
                    } catch (createError) {
                      console.log(`    ❌ Failed to create table ${tableName}: ${createError.message}`);
                      console.log(`    ⏭️  Skipping ${tableName} - table creation failed`);
                      continue;
                    }
                  } else {
                    // Some other error checking the table, but try to create it anyway
                    console.log(`    ⚠️  Table check had unexpected error, but will try to create ${tableName}`);
                    console.log(`    🏗️  Attempting to create ${tableName} from schema...`);
                    
                    // Try to create the table anyway
                    try {
                      const fs = require('fs');
                      const schemaContent = fs.readFileSync('schema.sql', 'utf8');
                      
                      // Find the CREATE TABLE statement for this specific table
                      const tableRegex = new RegExp(`CREATE TABLE ${tableName}\\s*\\([^;]+\\);`, 'is');
                      const tableMatch = schemaContent.match(tableRegex);
                      
                      if (tableMatch) {
                        const createTableSql = tableMatch[0];
                        console.log(`    📋 Found CREATE statement for ${tableName}`);
                        
                        // Create temporary SQL file and execute it
                        const tempFile = `./create_${tableName}_${Date.now()}.sql`;
                        fs.writeFileSync(tempFile, createTableSql);
                        
                        const result = execSync(`npx wrangler d1 execute librarycard-db-staging-new --config=wrangler.staging-new.toml --env=staging --remote --file="${tempFile}"`, {
                          encoding: 'utf8',
                          env: { ...process.env, CLOUDFLARE_API_TOKEN: process.env.CLOUDFLARE_API_TOKEN_STAGING_NEW }
                        });
                        fs.unlinkSync(tempFile);
                        
                        console.log(`    ✅ Created table: ${tableName}`);
                        tableReady = true;
                      } else {
                        console.log(`    ⚠️  Could not find CREATE statement for ${tableName} in schema`);
                        console.log(`    ⏭️  Skipping ${tableName} - cannot be created`);
                        continue;
                      }
                    } catch (createError) {
                      console.log(`    ❌ Failed to create table ${tableName}: ${createError.message}`);
                      console.log(`    ⏭️  Skipping ${tableName} - table creation failed`);
                      continue;
                    }
                  }
                }
                
                // Only proceed if table is ready
                if (!tableReady) {
                  console.log(`    ⏭️  Skipping ${tableName} - table not ready`);
                  continue;
                }
                
                // Switch to BATCH processing to avoid problematic row-by-row loop
                console.log(`    🔄 Processing ${tableData.data.length} rows for ${tableName} in batches...`);
                
                // Process in small batches to avoid GitHub Actions termination
                const batchSize = 5; // Small batches to prevent process termination
                const totalBatches = Math.ceil(tableData.data.length / batchSize);
                console.log(`    🎯 Will process ${totalBatches} batches of up to ${batchSize} rows each`);
                
                for (let batchIndex = 0; batchIndex < totalBatches; batchIndex++) {
                  const startRow = batchIndex * batchSize;
                  const endRow = Math.min(startRow + batchSize, tableData.data.length);
                  const batch = tableData.data.slice(startRow, endRow);
                  
                  console.log(`    `);
                  console.log(`    ==========================================`);
                  console.log(`    🎯 BATCH ${batchIndex + 1}/${totalBatches}: Processing rows ${startRow + 1}-${endRow}`);
                  console.log(`    ⏰ Batch start timestamp: ${new Date().toISOString()}`);
                  console.log(`    ==========================================`);
                  
                  // Create batch INSERT statement
                  const columns = Object.keys(batch[0]);
                  const batchValues = batch.map((row, rowIdx) => {
                    const values = columns.map(col => {
                      const value = row[col];
                      if (value === null || value === undefined) return 'NULL';
                      if (typeof value === 'string') {
                        // Comprehensive handling for book fields that are commonly JSON-encoded
                        const jsonArrayFields = ['authors', 'categories', 'tags', 'subjects', 'enhanced_genres', 'assigned_genres', 'alternative_covers'];
                        
                        // Special handling for fields that are JSON arrays/objects
                        if (jsonArrayFields.includes(col) || value.startsWith('[') || value.startsWith('{')) {
                          try {
                            // Validate it's valid JSON first
                            JSON.parse(value);
                            // For JSON fields, use single quotes to avoid SQL parsing issues with square brackets
                            return `'${value.replace(/'/g, "''")}'`;
                          } catch (parseError) {
                            // Not valid JSON despite field name or appearance, treat as regular string
                            console.log(`    ⚠️  Field ${col} looks like JSON but isn't valid: ${value.substring(0, 100)}...`);
                          }
                        }
                        
                        // Use single quotes for ALL string fields to avoid SQL parsing issues
                        return `'${value.replace(/'/g, "''")}'`;
                      }
                      if (typeof value === 'number') return value;
                      if (typeof value === 'boolean') return value ? 1 : 0;
                      
                      // Handle objects/arrays (common in book data)
                      try {
                        return JSON.stringify(JSON.stringify(value));
                      } catch (error) {
                        console.log(`    ⚠️  Could not serialize ${col} value: ${error.message}`);
                        return 'NULL';
                      }
                    });
                    return `(${values.join(', ')})`;
                  });
                  
                  const batchSql = `INSERT OR REPLACE INTO ${tableName} (${columns.join(', ')}) VALUES ${batchValues.join(', ')};`;
                  
                  console.log(`    📝 Batch SQL length: ${batchSql.length} characters`);
                  console.log(`    📄 Batch SQL preview: ${batchSql.substring(0, 500)}...`);
                  
                  // Add comprehensive debugging for book batches to find Jeremy anywhere
                  if (tableName === 'books') {
                    console.log(`    📚 Book batch debug info:`);
                    batch.forEach((book, idx) => {
                      const title = book.title || 'Unknown';
                      const authors = book.authors || 'Unknown';
                      console.log(`    📖 Row ${startRow + idx + 1}: "${title}" by ${authors}`);
                      
                      // COMPREHENSIVE Jeremy search across ALL fields
                      let foundJeremy = false;
                      Object.keys(book).forEach(field => {
                        const value = book[field];
                        if (value && typeof value === 'string' && value.includes('Jeremy')) {
                          console.log(`    🚨 FOUND JEREMY in field '${field}': ${value.substring(0, 200)}...`);
                          console.log(`    🔍 Field type: ${typeof value}`);
                          console.log(`    🔍 Field starts with [: ${value.startsWith('[')}`);
                          console.log(`    🔍 Field ends with ]: ${value.endsWith(']')}`);
                          
                          // Test the escaping logic for this field
                          try {
                            const escaped = JSON.stringify(value);
                            console.log(`    🔍 Escaped ${field}: ${escaped.substring(0, 200)}...`);
                          } catch (e) {
                            console.log(`    ❌ Escaping failed for ${field}: ${e.message}`);
                          }
                          foundJeremy = true;
                        }
                      });
                      
                      if (!foundJeremy) {
                        console.log(`    ✅ No Jeremy found in row ${startRow + idx + 1}`);
                      }
                    });
                    
                    // Also check if Jeremy appears in the final SQL
                    if (batchSql.includes('Jeremy')) {
                      console.log(`    🚨 Jeremy found in final batch SQL at positions:`);
                      let pos = 0;
                      while ((pos = batchSql.indexOf('Jeremy', pos)) !== -1) {
                        const start = Math.max(0, pos - 100);
                        const end = Math.min(batchSql.length, pos + 200);
                        console.log(`    🔍 Position ${pos}: ...${batchSql.substring(start, end)}...`);
                        
                        // Show more context around the error position (567)
                        if (Math.abs(pos - 567) < 50) {
                          console.log(`    🚨 CRITICAL: This Jeremy is near error position 567!`);
                          const errorStart = Math.max(0, 567 - 150);
                          const errorEnd = Math.min(batchSql.length, 567 + 150);
                          console.log(`    🔍 Error context (pos 567): ...${batchSql.substring(errorStart, errorEnd)}...`);
                        }
                        pos++;
                      }
                    }
                  }
                  
                  // Use file-based execution for batch
                  const fs = require('fs');
                  const tempFile = `./batch_sql_${Date.now()}_${Math.random().toString(36).slice(2)}.sql`;
                  fs.writeFileSync(tempFile, batchSql);
                  
                  try {
                    console.log(`    🔄 Executing batch SQL file with wrangler...`);
                    console.log(`    ⏰ Starting batch wrangler execution at: ${new Date().toISOString()}`);
                    
                    const result = execSync(`npx wrangler d1 execute librarycard-db-staging-new --config=wrangler.staging-new.toml --env=staging --remote --file="${tempFile}"`, { 
                      encoding: 'utf8',
                      timeout: 120000,
                      env: { ...process.env, CLOUDFLARE_API_TOKEN: process.env.CLOUDFLARE_API_TOKEN_STAGING_NEW }
                    });
                    
                    console.log(`    ⏰ Batch wrangler execution completed at: ${new Date().toISOString()}`);
                    console.log(`    ✅ Batch SQL executed successfully`);
                    console.log(`    📊 Batch wrangler output: ${result.substring(0, 1000)}...`);
                    
                    // Verify batch using wrangler response
                    if (result.includes('"success": true') && result.includes('"changes"')) {
                      const changesMatch = result.match(/"changes":\s*(\d+)/);
                      const changes = changesMatch ? parseInt(changesMatch[1]) : 0;
                      console.log(`    ✅ Batch reports ${changes} database changes for ${batch.length} rows`);
                    }
                    
                    // Clean up temp file
                    fs.unlinkSync(tempFile);
                    console.log(`    ✅ Batch ${batchIndex + 1}/${totalBatches} completed (rows ${startRow + 1}-${endRow})`);
                    
                  } catch (batchError) {
                    console.log(`    🚨 CRITICAL BATCH FAILURE - STOPPING SYNC`);
                    console.log(`    ❌ Batch execution failed: ${batchError.message}`);
                    console.log(`    📄 Failed batch SQL: ${batchSql.substring(0, 500)}...`);
                    
                    // PRESERVE the failing SQL file for debugging
                    const preservedFile = `./FAILED_BATCH_${batchIndex + 1}_${tableName}_${Date.now()}.sql`;
                    try {
                      fs.copyFileSync(tempFile, preservedFile);
                      console.log(`    💾 PRESERVED failing SQL file: ${preservedFile}`);
                      console.log(`    🔍 File size: ${fs.statSync(preservedFile).size} bytes`);
                    } catch (preserveError) {
                      console.log(`    ⚠️  Could not preserve SQL file: ${preserveError.message}`);
                    }
                    
                    // Still clean up original temp file
                    try { fs.unlinkSync(tempFile); } catch {}
                    throw new Error(`BATCH SYNC FAILED: Batch ${batchIndex + 1} failed: ${batchError.message}`);
                  }
                }
                
                console.log(`    ✅ Synced ${tableName}: ${tableData.data.length} rows`);
                syncedTables++;
                syncedRows += tableData.data.length;
                
                // Verify critical tables actually exist after sync
                if (tableName === 'books') {
                  try {
                    const verifyResult = executeStagingD1Command('SELECT COUNT(*) as count FROM books LIMIT 1;');
                    console.log(`🔍 VERIFICATION: books table count check: ${verifyResult.substring(0, 200)}...`);
                  } catch (verifyError) {
                    console.log(`🚨 VERIFICATION FAILED: books table not accessible: ${verifyError.message}`);
                  }
                }
                
              } catch (error) {
                console.error(`    🚨 CRITICAL TABLE FAILURE - STOPPING ENTIRE SYNC`);
                console.error(`    ❌ Failed to sync ${tableName}: ${error.message}`);
                console.error(`    📊 Tables completed before failure: ${syncedTables}`);
                console.error(`    📊 Rows completed before failure: ${syncedRows}`);
                console.error(`    🚨 STAGING DATABASE IS NOW IN INCONSISTENT STATE`);
                
                // Log the complete failure details
                console.error(`    📋 Failure details:`);
                console.error(`       - Table: ${tableName}`);
                console.error(`       - Expected rows: ${tableData.data.length}`);
                console.error(`       - Error: ${error.message}`);
                
                throw new Error(`COMPLETE SYNC FAILURE: Table ${tableName} failed, stopping sync to prevent partial data state: ${error.message}`);
              }
            }
            
            // RE-ENABLE foreign key constraints after sync
            console.log('\n🔧 Re-enabling foreign key constraints after sync...');
            try {
              executeStagingD1Command('PRAGMA foreign_keys = ON;');
