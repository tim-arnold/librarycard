            console.log(`📊 Tables synced: ${syncedTables}`);
            console.log(`📊 Total rows synced: ${syncedRows}`);
            console.log('=====================================================\n');
            
            // COMPREHENSIVE FINAL VERIFICATION
            console.log('🔍 COMPREHENSIVE STAGING VERIFICATION...');
            const verificationResults = {};
            let criticalVerificationFailed = false;
            
            // Check each critical table
            for (const tableName of criticalTables) {
              try {
                console.log(`🔍 Verifying ${tableName}...`);
                const countResult = executeStagingD1Command(`SELECT COUNT(*) as count FROM ${tableName}`);
                const count = parseCount(countResult);
                verificationResults[tableName] = { status: 'OK', count: count };
                console.log(`✅ ${tableName}: ${count} rows in staging`);
                
                // Critical failure if essential tables are empty
                if (count === 0 && ['users', 'books', 'locations'].includes(tableName)) {
                  console.log(`🚨 CRITICAL: ${tableName} table is empty! App will not work!`);
                  criticalVerificationFailed = true;
                }
              } catch (error) {
                console.log(`❌ ${tableName}: VERIFICATION FAILED - ${error.message}`);
                verificationResults[tableName] = { status: 'ERROR', error: error.message };
                criticalVerificationFailed = true;
              }
            }
            
            // Show verification summary
            console.log('\n📊 VERIFICATION SUMMARY:');
            Object.entries(verificationResults).forEach(([tableName, result]) => {
              if (result.status === 'OK') {
                console.log(`✅ ${tableName}: ${result.count} rows`);
              } else {
                console.log(`❌ ${tableName}: ${result.error}`);
              }
            });
            
            if (criticalVerificationFailed) {
              console.log('\n🚨 CRITICAL VERIFICATION FAILURE!');
              console.log('🚨 Essential tables are missing or empty in staging');
              console.log('🚨 App functionality will be severely impacted');
              console.log('🚨 This indicates backup data issues or sync failures');
              
              // Don't fail the workflow, but make the issue very clear
              console.log('\n⚠️  SYNC COMPLETED BUT WITH CRITICAL DATA MISSING');
              console.log('⚠️  Manual investigation required before using staging');
            } else {
              console.log('\n✅ STAGING NOW COMPLETELY MATCHES PRODUCTION!');
              console.log('🎯 All production data successfully synced to staging');
              console.log('🎉 Staging environment ready for testing');
            }
          }
          
          function executeStagingD1Command(sql) {
            const command = `npx wrangler d1 execute librarycard-db-staging-new --config=wrangler.staging-new.toml --env=staging --remote --command="${sql.replace(/"/g, '\\"')}"`;
            
            return execSync(command, { 
              encoding: 'utf8', 
              maxBuffer: 10 * 1024 * 1024,
              env: { ...process.env, CLOUDFLARE_API_TOKEN: process.env.CLOUDFLARE_API_TOKEN_STAGING_NEW }
            });
          }
          
          function parseCount(output) {
            try {
              const lines = output.split('\n');
              const jsonStart = lines.findIndex(line => line.trim().startsWith('['));
              if (jsonStart === -1) return 'unknown';
              
              const jsonText = lines.slice(jsonStart).join('\n');
              const data = JSON.parse(jsonText);
              
              if (Array.isArray(data) && data[0] && data[0].results && data[0].results[0]) {
                return data[0].results[0].count;
              }
              return 'unknown';
            } catch (error) {
              return 'unknown';
            }
          }
          
          // Run it
          syncProductionToStaging().catch(error => {
            console.error('❌ Complete sync failed:', error.message);
            process.exit(1);
          });
          EOF
          
          # Run the complete sync
