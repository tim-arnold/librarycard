[build]
  command = "DISABLE_ESLINT_PLUGIN=true npx next build"
  
[build.environment]
  NODE_VERSION = "20"

# Staging branch context
[context.staging]
  command = "DISABLE_ESLINT_PLUGIN=true npx next build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  # Enable Next.js SSR
  node_bundler = "esbuild"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: http:; connect-src 'self' https: http:; frame-src 'self' https://challenges.cloudflare.com https://accounts.google.com; object-src 'none';"

# Cache static assets only
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"