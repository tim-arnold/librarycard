# Default environment - Local development
# Use: npm run dev (frontend) + npx wrangler dev (worker)
name = "librarycard-api-local"
main = "workers/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
account_id = "4bef1453ad78da6e3bb7e83b421e26df"

[vars]
ENVIRONMENT = "local"
APP_URL = "http://localhost:3000"
FROM_EMAIL = "LibraryCard <noreply@localhost>"
JWT_SECRET = "dev-jwt-secret-change-in-production-environments"

[[d1_databases]]
binding = "DB"
database_name = "libarycard-db-local"
database_id = "5365a633-7869-4993-990a-90aa12e9974e"

[[kv_namespaces]]
binding = "CACHE"
id = "9f569f411f764d83a6c87e1bda2494ae"

# Local environment (explicit)
# Use: npx wrangler dev --env=local
[env.local]
name = "librarycard-api-local"

[env.local.vars]
ENVIRONMENT = "local"
APP_URL = "http://localhost:3000"
FROM_EMAIL = "LibraryCard <noreply@localhost>"
JWT_SECRET = "dev-jwt-secret-change-in-production-environments"

[[env.local.d1_databases]]
binding = "DB"
database_name = "libarycard-db-local"
database_id = "5365a633-7869-4993-990a-90aa12e9974e"

[[env.local.kv_namespaces]]
binding = "CACHE"
id = "9f569f411f764d83a6c87e1bda2494ae"

# Staging environment
# Use: npx wrangler deploy --env=staging
[env.staging]
name = "librarycard-api-staging"
account_id = "18394f148930f0f3933fee06ecef99d0"

[env.staging.vars]
ENVIRONMENT = "staging"
APP_URL = "https://staging--libarycard.netlify.app"
FROM_EMAIL = "LibraryCard <librarian@tim52.io>"
JWT_SECRET = "dev-jwt-secret-change-in-production-environments"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "librarycard-db-staging-new"
database_id = "4283d8af-c667-4673-8505-108f02b4609c"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "22522f1582fc4b45b8b59446fca5c791"

# Production environment  
# Use: npx wrangler deploy --env=production
[env.production]
name = "librarycard-api-production"
compatibility_flags = ["nodejs_compat"]

[env.production.vars]
ENVIRONMENT = "production"
APP_URL = "https://librarycard.tim52.io"
FROM_EMAIL = "LibraryCard <librarian@tim52.io>"
# JWT_SECRET should be set as a secure environment variable for production

[[env.production.d1_databases]]
binding = "DB"
database_name = "librarycard-db"
database_id = "368ab7bc-fb42-4607-a4cf-761dc7795284"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "8f5a86fc82a64b10ba946d749f2dc8f4"